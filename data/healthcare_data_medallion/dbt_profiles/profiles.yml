# This file defines dbt profiles for deployed dbt jobs.
# Use profile "databricks" for Databricks; use "sqlite" for local medallion (requires dbt-sqlite, DB pre-loaded from CSVs).
databricks:
  target: dev # default target
  outputs:
    dev:
      type: databricks
      method: http
      catalog: workspace
      schema: "healthcare_medallion_dev"
      http_path: /sql/1.0/warehouses/2a475c6457a76313
      host: "{{ env_var('DBT_HOST') }}"
      token: "{{ env_var('DBT_ACCESS_TOKEN') }}"
    prod:
      type: databricks
      method: http
      catalog: workspace
      schema: "healthcare_medallion_prod"
      http_path: /sql/1.0/warehouses/2a475c6457a76313
      host: "{{ env_var('DBT_HOST') }}"
      token: "{{ env_var('DBT_ACCESS_TOKEN') }}"

# Optional: local medallion (DuckDB). Run from repo root: make data-local-generate then make data-local-dbt-run.
# Raw tables must exist in DuckDB (e.g. load data/local/*.csv or use DuckDB read_csv_auto views); set source_schema via env or override.
duckdb:
  target: local
  outputs:
    local:
      type: duckdb
      path: "{{ env_var('DBT_DUCKDB_PATH', 'data/local/medallion.duckdb') }}"
      schema: healthcare_medallion_local

# Optional: local medallion (SQLite). Install dbt-sqlite; create DB and load source tables from generator CSVs first.
sqlite:
  target: local
  outputs:
    local:
      type: sqlite
      path: "data/local/medallion.db"

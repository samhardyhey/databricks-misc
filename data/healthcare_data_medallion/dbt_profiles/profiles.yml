# This file defines dbt profiles for deployed dbt jobs.
# Use profile "databricks" for Databricks; use "sqlite" for local medallion (requires dbt-sqlite, DB pre-loaded from CSVs).
databricks:
  target: dev # default target
  outputs:
    dev:
      type: databricks
      method: http
      catalog: workspace
      schema: "healthcare_medallion_dev"
      http_path: /sql/1.0/warehouses/2a475c6457a76313
      host: "{{ env_var('DBT_HOST') }}"
      token: "{{ env_var('DBT_ACCESS_TOKEN') }}"
    prod:
      type: databricks
      method: http
      catalog: workspace
      schema: "healthcare_medallion_prod"
      http_path: /sql/1.0/warehouses/2a475c6457a76313
      host: "{{ env_var('DBT_HOST') }}"
      token: "{{ env_var('DBT_ACCESS_TOKEN') }}"

# Optional: local medallion. Install dbt-sqlite; create DB and load source tables from generator CSVs first; then run dbt --profile sqlite.
sqlite:
  target: local
  outputs:
    local:
      type: sqlite
      path: "data/local/medallion.db"

# dbt profiles for healthcare_data_medallion (Databricks + local DuckDB).
#
# Target names dev-sp / test-sp / prod-sp align with Databricks CLI profiles in ~/.databrickscfg
# (e.g. [dev-sp], [test-sp], [prod-sp]). dbt-databricks does not read ~/.databrickscfg directly; use
# the same host + credentials those profiles would use:
#   - PAT: set DATABRICKS_HOST and DATABRICKS_TOKEN before `dbt` (mirror the host/token from the matching profile).
#   - Service principal: prefer auth_type: oauth with client_id / client_secret env vars
#     (see https://docs.getdbt.com/reference/warehouse-profiles/databricks-profile).
#
# SQL warehouse http_path below is demo-specific; update per workspace or move to env/credentials.
databricks:
  target: dev-sp
  outputs:
    dev-sp:
      type: databricks
      method: http
      catalog: ebos_uc_demo
      schema: "healthcare_medallion_dev"
      http_path: /sql/1.0/warehouses/2a475c6457a76313
      host: "{{ env_var('DATABRICKS_HOST') }}"
      token: "{{ env_var('DATABRICKS_TOKEN') }}"
    test-sp:
      type: databricks
      method: http
      catalog: ebos_uc_demo
      schema: "healthcare_medallion_test"
      http_path: /sql/1.0/warehouses/2a475c6457a76313
      host: "{{ env_var('DATABRICKS_HOST') }}"
      token: "{{ env_var('DATABRICKS_TOKEN') }}"
    prod-sp:
      type: databricks
      method: http
      catalog: ebos_uc_demo
      schema: "healthcare_medallion_prod"
      http_path: /sql/1.0/warehouses/2a475c6457a76313
      host: "{{ env_var('DATABRICKS_HOST') }}"
      token: "{{ env_var('DATABRICKS_TOKEN') }}"
    # Legacy targets (kept for local or older deploys)
    dev:
      type: databricks
      method: http
      catalog: ebos_uc_demo
      schema: "healthcare_medallion_dev"
      http_path: /sql/1.0/warehouses/2a475c6457a76313
      host: "{{ env_var('DATABRICKS_HOST') }}"
      token: "{{ env_var('DATABRICKS_TOKEN') }}"
    prod:
      type: databricks
      method: http
      catalog: ebos_uc_demo
      schema: "healthcare_medallion_prod"
      http_path: /sql/1.0/warehouses/2a475c6457a76313
      host: "{{ env_var('DATABRICKS_HOST') }}"
      token: "{{ env_var('DATABRICKS_TOKEN') }}"

# Optional: local medallion (DuckDB). Run from repo root: make data-local-generate then make data-local-dbt-run.
duckdb:
  target: local
  outputs:
    local:
      type: duckdb
      path: "{{ env_var('DBT_DUCKDB_PATH', 'data/local/medallion.duckdb') }}"
      schema: healthcare_medallion_local

# Optional: local medallion (SQLite). Install dbt-sqlite; create DB and load source tables from generator CSVs first.
sqlite:
  target: local
  outputs:
    local:
      type: sqlite
      path: "data/local/medallion.db"

version: 2

sources:
  - name: healthcare_raw
    description: "Raw healthcare data generated by the healthcare_data_generator asset bundle"
    schema: "{{ var('source_schema', 'healthcare_dev_raw') }}"
    tables:
      - name: healthcare_pharmacies
        description: "Raw pharmacy data"
        columns:
          - name: pharmacy_id
            description: "Unique pharmacy identifier"
            tests:
              - unique
              - not_null
          - name: name
            description: "Pharmacy name"
            tests:
              - not_null
          - name: state
            description: "Australian state/territory"
            tests:
              - not_null
              - accepted_values:
                  values: ["NSW", "VIC", "QLD", "WA", "SA", "TAS", "ACT", "NT"]
          - name: is_chain
            description: "Whether pharmacy is part of a chain"
            tests:
              - not_null
          - name: monthly_revenue
            description: "Monthly revenue in AUD"
            tests:
              - not_null
              - dbt_utils.accepted_range:
                  min_value: 0
                  max_value: 1000000

      - name: healthcare_hospitals
        description: "Raw hospital data"
        columns:
          - name: hospital_id
            description: "Unique hospital identifier"
            tests:
              - unique
              - not_null
          - name: name
            description: "Hospital name"
            tests:
              - not_null
          - name: hospital_type
            description: "Type of hospital"
            tests:
              - not_null
          - name: state
            description: "Australian state/territory"
            tests:
              - not_null
              - accepted_values:
                  values: ["NSW", "VIC", "QLD", "WA", "SA", "TAS", "ACT", "NT"]
          - name: beds
            description: "Number of beds"
            tests:
              - not_null
              - dbt_utils.accepted_range:
                  min_value: 1
                  max_value: 2000

      - name: healthcare_products
        description: "Raw pharmaceutical products data"
        columns:
          - name: product_id
            description: "Unique product identifier"
            tests:
              - unique
              - not_null
          - name: name
            description: "Product name"
            tests:
              - not_null
          - name: category
            description: "Product category"
            tests:
              - not_null
          - name: unit_price
            description: "Unit price in AUD"
            tests:
              - not_null
              - dbt_utils.accepted_range:
                  min_value: 0
                  max_value: 10000
          - name: is_prescription
            description: "Whether product requires prescription"
            tests:
              - not_null

      - name: healthcare_orders
        description: "Raw orders data"
        columns:
          - name: order_id
            description: "Unique order identifier"
            tests:
              - unique
              - not_null
          - name: customer_id
            description: "Customer identifier (pharmacy or hospital)"
            tests:
              - not_null
          - name: customer_type
            description: "Type of customer"
            tests:
              - not_null
              - accepted_values:
                  values: ["Pharmacy", "Hospital"]
          - name: product_id
            description: "Product identifier"
            tests:
              - not_null
          - name: order_date
            description: "Order date"
            tests:
              - not_null
          - name: quantity
            description: "Order quantity"
            tests:
              - not_null
              - dbt_utils.accepted_range:
                  min_value: 1
                  max_value: 1000
          - name: total_amount
            description: "Total order amount in AUD"
            tests:
              - not_null
              - dbt_utils.accepted_range:
                  min_value: 0
                  max_value: 100000

      - name: healthcare_inventory
        description: "Raw inventory data"
        columns:
          - name: inventory_id
            description: "Unique inventory record identifier"
            tests:
              - unique
              - not_null
          - name: pharmacy_id
            description: "Pharmacy identifier"
            tests:
              - not_null
          - name: product_id
            description: "Product identifier"
            tests:
              - not_null
          - name: current_stock
            description: "Current stock level"
            tests:
              - not_null
              - dbt_utils.accepted_range:
                  min_value: 0
                  max_value: 10000
          - name: reorder_level
            description: "Reorder level threshold"
            tests:
              - not_null
              - dbt_utils.accepted_range:
                  min_value: 0
                  max_value: 1000

      - name: healthcare_supply_chain_events
        description: "Raw supply chain events data"
        columns:
          - name: event_id
            description: "Unique event identifier"
            tests:
              - unique
              - not_null
          - name: order_id
            description: "Associated order identifier"
            tests:
              - not_null
          - name: event_type
            description: "Type of event"
            tests:
              - not_null
          - name: event_timestamp
            description: "Event timestamp"
            tests:
              - not_null
          - name: status
            description: "Event status"
            tests:
              - not_null
              - accepted_values:
                  values: ["Success", "Warning", "Error", "Pending"]

      - name: healthcare_suppliers
        description: "Raw suppliers (foundation for products and POs)"
      - name: healthcare_warehouses
        description: "Raw warehouses (1:1 with pharmacies)"
      - name: healthcare_product_interactions
        description: "Raw product interactions (recommendation engine)"
      - name: healthcare_substitution_events
        description: "Raw substitution events (recommendation engine)"
      - name: healthcare_inventory_availability
        description: "Raw inventory availability (recommendation engine)"
      - name: healthcare_expiry_batches
        description: "Raw expiry batches (inventory optimisation)"
      - name: healthcare_writeoff_events
        description: "Raw writeoff events (inventory optimisation)"
      - name: healthcare_purchase_orders
        description: "Raw purchase orders (inventory optimisation)"
      - name: healthcare_supplier_performance
        description: "Raw supplier performance (inventory optimisation)"
      - name: healthcare_warehouse_costs
        description: "Raw warehouse costs (insights)"
      - name: healthcare_competitor_products
        description: "Raw competitor products (insights)"
      - name: healthcare_competitor_price_history
        description: "Raw competitor price history (insights)"
      - name: healthcare_store_sales
        description: "Raw store sales (insights)"
      - name: healthcare_store_attributes
        description: "Raw store attributes (insights)"
      - name: healthcare_promotions
        description: "Raw promotions (insights)"

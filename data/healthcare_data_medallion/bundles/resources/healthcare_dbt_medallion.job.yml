resources:
  jobs:
    # Complete Medallion Job - All layers in one job with task dependencies
    healthcare_data_medallion_job:
      name: healthcare_data_medallion_job
      description: "Healthcare Data Medallion - Complete Pipeline (Bronze → Silver → Gold)"
      tags:
        business_unit: ebos
        workload: ds-ml-demo
        uc_catalog: ebos_uc_demo
        repository: databricks-misc
        bundle: healthcare_data_medallion
        deployment_environment: ${var.tag_environment}

      trigger:
        periodic:
          interval: 1
          unit: DAYS

      tasks:
        # Bronze Layer Task
        - task_key: dbt_bronze
          dbt_task:
            project_directory: ..
            profiles_directory: ../dbt_profiles
            commands:
              - "dbt deps --target=${bundle.target}"
              - "dbt run --select tag:bronze --target=${bundle.target}"
              - "dbt test --select tag:bronze --target=${bundle.target}"

          environment_key: default

        # Silver Layer Task - depends on Bronze
        - task_key: dbt_silver
          dbt_task:
            project_directory: ..
            profiles_directory: ../dbt_profiles
            commands:
              - "dbt deps --target=${bundle.target}"
              - "dbt run --select tag:silver --target=${bundle.target}"
              - "dbt test --select tag:silver --target=${bundle.target}"

          environment_key: default

          depends_on:
            - task_key: dbt_bronze

        # Gold Layer Task - depends on Silver
        - task_key: dbt_gold
          dbt_task:
            project_directory: ..
            profiles_directory: ../dbt_profiles
            commands:
              - "dbt deps --target=${bundle.target}"
              - "dbt run --select tag:gold --target=${bundle.target}"
              - "dbt test --select tag:gold --target=${bundle.target}"

          environment_key: default

          depends_on:
            - task_key: dbt_silver

      environments:
        - environment_key: default
          spec:
            client: "2"
            dependencies:
              - dbt-databricks>=1.8.0,<2.0.0

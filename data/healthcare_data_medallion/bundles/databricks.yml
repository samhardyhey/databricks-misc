# Healthcare data medallion (dbt) bundle.
# See https://docs.databricks.com/dev-tools/bundles/index.html
bundle:
  name: healthcare_data_medallion
  uuid: e89aa3be-8264-4e6a-9d9d-4ea072233ff9

include:
  - ../resources/*.yml
  - ../resources/*/*.yml

sync:
  paths:
    - ../../..  # repo root

variables:
  catalog:
    description: Unity Catalog for medallion output
    default: workspace
  source_schema:
    description: Schema containing raw healthcare tables (e.g. healthcare_dev_raw)
    default: healthcare_dev_raw
  medallion_schema:
    description: Schema for medallion output (e.g. healthcare_medallion_dev)
    default: healthcare_medallion_dev

targets:
  dev-sp:
    mode: development
    default: true
    workspace:
      host: https://dbc-f501771e-54b7.cloud.databricks.com
      root_path: /Workspace/Users/samhardyhey@gmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: workspace
      source_schema: healthcare_dev_raw
      medallion_schema: healthcare_medallion_dev
  test-sp:
    mode: development
    workspace:
      host: https://dbc-f501771e-54b7.cloud.databricks.com
      root_path: /Workspace/Users/samhardyhey@gmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: workspace
      source_schema: healthcare_test_raw
      medallion_schema: healthcare_medallion_test

  prod-sp:
    mode: production
    workspace:
      host: https://dbc-f501771e-54b7.cloud.databricks.com
      root_path: /Workspace/Users/samhardyhey@gmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: workspace
      source_schema: healthcare_prod_raw
      medallion_schema: healthcare_medallion_prod
    permissions:
      - user_name: samhardyhey@gmail.com
        level: CAN_MANAGE


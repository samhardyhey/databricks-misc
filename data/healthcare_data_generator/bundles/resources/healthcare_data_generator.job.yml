# The main job for healthcare_data.
resources:
  jobs:
    healthcare_data_generator_job:
      name: healthcare_data_generator_job

      schedule:
        # Run this job every 15 minutes to simulate high-frequency system
        quartz_cron_expression: "0 0/15 * * * ?" # Runs every 15 minutes
        timezone_id: "Australia/Sydney" # Australian timezone

      #email_notifications:
      #  on_failure:
      #    - your_email@example.com

      tasks:
        - task_key: generate_healthcare_data
          spark_python_task:
            python_file: data/healthcare_data_generator/src/generate_catalog_data_static.py
          environment_key: default

      environments:
        - environment_key: default
          spec:
            client: "2"
            env_vars:
              CATALOG_NAME: ${var.catalog}
              SCHEMA_NAME: ${var.source_schema}
              PYTHONPATH: ${var.workspace_root}
            dependencies:
              - faker>=24.0.0
              - pandas>=2.2.0
              - "numpy>=1.24.0,<2.0.0"
              - "pyarrow>=4.0.0,<15.0.0"
              - loguru>=0.7.2

# Healthcare data generator — bundle layout matches use-case DABs: databricks.yml + resources/*.yml under bundles/.
# Deploy from this directory: databricks bundle deploy -t dev-sp
bundle:
  name: healthcare_data_generator
  uuid: ebbc066e-3105-4f82-b446-4d5b1a31d23a

include:
  - resources/*.yml

sync:
  paths:
    - ../../..  # repo root (data/healthcare_data_generator/bundles -> repo)

variables:
  catalog:
    description: Unity Catalog name for raw data
    default: workspace
  source_schema:
    description: Schema for raw healthcare tables (e.g. healthcare_dev_raw)
    default: healthcare_dev_raw
  workspace_root:
    description: Workspace path where bundle is deployed (for PYTHONPATH when needed)
    default: ""
  service_principal_name:
    description: Service principal for job run_as and bundle resource permissions
    default: c8c4498a-fd58-45b7-a8c7-39f91f385dbf

targets:
  dev-sp:
    mode: development
    default: true
    workspace:
      host: https://dbc-f501771e-54b7.cloud.databricks.com
      root_path: /Workspace/Users/sam.hardy@ebosgroup.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: workspace
      source_schema: healthcare_dev_raw
      workspace_root: /Workspace/Users/sam.hardy@ebosgroup.com/.bundle/${bundle.name}/${bundle.target}
      service_principal_name: <TBD-DATA-GENERATOR-DEV-SP>
    run_as:
      service_principal_name: ${var.service_principal_name}
    permissions:
      - user_name: sam.hardy@ebosgroup.com
        level: CAN_MANAGE
      - service_principal_name: ${var.service_principal_name}
        level: CAN_MANAGE
    resources:
      jobs:
        healthcare_data_generator_job:
          schedule:
            pause_status: PAUSED

  test-sp:
    mode: development
    workspace:
      host: https://dbc-f501771e-54b7.cloud.databricks.com
      root_path: /Workspace/Users/sam.hardy@ebosgroup.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: workspace
      source_schema: healthcare_test_raw
      workspace_root: /Workspace/Users/sam.hardy@ebosgroup.com/.bundle/${bundle.name}/${bundle.target}
      service_principal_name: <TBD-DATA-GENERATOR-TEST-SP>
    run_as:
      service_principal_name: ${var.service_principal_name}
    permissions:
      - user_name: sam.hardy@ebosgroup.com
        level: CAN_MANAGE
      - service_principal_name: ${var.service_principal_name}
        level: CAN_MANAGE
    resources:
      jobs:
        healthcare_data_generator_job:
          schedule:
            pause_status: PAUSED

  prod-sp:
    mode: production
    workspace:
      host: https://dbc-f501771e-54b7.cloud.databricks.com
      root_path: /Workspace/Users/sam.hardy@ebosgroup.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: workspace
      source_schema: healthcare_prod_raw
      workspace_root: /Workspace/Users/sam.hardy@ebosgroup.com/.bundle/${bundle.name}/${bundle.target}
      service_principal_name: <TBD-DATA-GENERATOR-PROD-SP>
    run_as:
      service_principal_name: ${var.service_principal_name}
    permissions:
      - user_name: sam.hardy@ebosgroup.com
        level: CAN_MANAGE
      - service_principal_name: ${var.service_principal_name}
        level: CAN_MANAGE

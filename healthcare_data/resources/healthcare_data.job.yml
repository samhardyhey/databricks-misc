# The main job for healthcare_data.
resources:
  jobs:
    healthcare_data_job:
      name: healthcare_data_job

      trigger:
        # Run this job every day, exactly one day from the last run; see https://docs.databricks.com/api/workspace/jobs/create#trigger
        periodic:
          interval: 1
          unit: DAYS

      #email_notifications:
      #  on_failure:
      #    - your_email@example.com

      tasks:
        - task_key: generate_healthcare_data
          spark_python_task:
            python_file: ../src/generate_catalog_data_static.py
          environment_key: default

      environments:
        - environment_key: default
          spec:
            client: "2"
            dependencies:
              - faker>=24.0.0
              - pandas>=2.2.0
              - "numpy>=1.24.0,<2.0.0"
              - "pyarrow>=4.0.0,<15.0.0"
              - loguru>=0.7.2

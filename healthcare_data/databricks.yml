# This is a Databricks asset bundle definition for healthcare_data.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: healthcare_data
  uuid: ebbc066e-3105-4f82-b446-4d5b1a31d23a

include:
  - resources/*.yml
  - resources/*/*.yml

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://dbc-f501771e-54b7.cloud.databricks.com

  prod:
    mode: production
    workspace:
      host: https://dbc-f501771e-54b7.cloud.databricks.com
      # We explicitly deploy to /Workspace/Users/samhardyhey@gmail.com to make sure we only have a single copy.
      root_path: /Workspace/Users/samhardyhey@gmail.com/.bundle/${bundle.name}/${bundle.target}
    permissions:
      - user_name: samhardyhey@gmail.com
        level: CAN_MANAGE

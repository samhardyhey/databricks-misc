# Evening Endpoint Shutdown Job
# Scales down VLM endpoint for cost savings (10 PM AEST)

resources:
  jobs:
    hps_clinical_notes_endpoint_evening_shutdown:
      name: "hps-clinical-notes-endpoint-evening-shutdown"
      description: "Scale down VLM endpoint for overnight cost savings - reduces to scale-to-zero"
      
      # Cron scheduling for precise timing - 10 PM AEST daily
      schedule:
        quartz_cron_expression: "0 0 22 * * ?"  # 10 PM AEST daily
        timezone_id: "Australia/Sydney"
        pause_status: "PAUSED"  # Default to paused, override in prod target
      
      # Job-level configuration
      timeout_seconds: 3600  # 1 hour timeout
      max_concurrent_runs: 1
      
      # Email notifications for production monitoring
      email_notifications:
        on_failure:
          - "sam.hardy@ebosgroup.com"
        on_success: []  # Only notify on failures to reduce noise
      
      # Main scaling task using serverless compute
      tasks:
        - task_key: "scale_down_vlm_endpoint"
          spark_python_task:
            python_file: ${workspace.file_path}/notebooks/endpoint_management/vlm_endpoint_scaler.py
            parameters:
              - "--endpoint_name=hps-clinical-notes-vlm-endpoint"
              - "--operation=scale_down"
              - "--min_concurrency=0"
              - "--max_concurrency=${var.endpoint_max_concurrency}"
              - "--environment=${var.schema}"
          environment_key: serverless_default
      
      # Serverless execution environments
      environments:
        - environment_key: serverless_default
          spec:
            client: "1"
            dependencies:
              - "databricks-sdk"
              - "requests"
      
      # Service principal execution
      run_as:
        service_principal_name: ${var.service_principal_name}
      
      # Permissions aligned with service principal  
      permissions:
        - service_principal_name: ${var.service_principal_name}
          level: CAN_MANAGE
        - user_name: sam.hardy@ebosgroup.com
          level: CAN_MANAGE
        - group_name: ${var.ml_ai_group_name}
          level: CAN_MANAGE
        - group_name: ${var.jsl_group_name}
          level: CAN_MANAGE
        - group_name: ${var.crud_group_name}
          level: CAN_MANAGE
      
      # Resource tags for cost tracking
      tags:
        business_unit: HPS
        division: Healthcare
        project: "HPS Clinical Notes"
# Morning Endpoint Startup Job
# Scales up VLM endpoint for business hours (6 AM AEST)

resources:
  jobs:
    hps_clinical_notes_endpoint_morning_startup:
      name: "hps-clinical-notes-endpoint-morning-startup"
      description: "Scale up VLM endpoint for business hours - ensures minimum concurrency for SLA compliance"
      
      # Cron scheduling for precise timing - 6 AM AEST daily
      schedule:
        quartz_cron_expression: "0 0 6 * * ?"  # 6 AM AEST daily
        timezone_id: "Australia/Sydney"
        pause_status: "PAUSED"  # Default to paused, override in prod target
      
      # Job configuration
      max_concurrent_runs: 1
      timeout_seconds: 1800  # 30 minutes timeout
      
      # Email notifications for production monitoring
      email_notifications:
        on_failure:
          - "sam.hardy@ebosgroup.com"
        no_alert_for_skipped_runs: true
      
      # Main scaling task using serverless compute
      tasks:
        - task_key: "scale_up_vlm_endpoint"
          spark_python_task:
            python_file: ${workspace.file_path}/notebooks/endpoint_management/vlm_endpoint_scaler.py
            parameters:
              - "--endpoint_name=hps-clinical-notes-vlm-endpoint"
              - "--operation=scale_up"
              - "--min_concurrency=${var.endpoint_min_concurrency}"
              - "--max_concurrency=${var.endpoint_max_concurrency}"
              - "--environment=${var.schema}"
          environment_key: serverless_default
      
      # Serverless execution environments
      environments:
        - environment_key: serverless_default
          spec:
            client: "1"
            dependencies:
              - "databricks-sdk"
              - "requests"
      
      # Service principal execution
      run_as:
        service_principal_name: ${var.service_principal_name}
      
      # Permissions aligned with service principal  
      permissions:
        - service_principal_name: ${var.service_principal_name}
          level: CAN_MANAGE
        - user_name: sam.hardy@ebosgroup.com
          level: CAN_MANAGE
        - group_name: ${var.ml_ai_group_name}
          level: CAN_MANAGE
        - group_name: ${var.jsl_group_name}
          level: CAN_MANAGE
        - group_name: ${var.crud_group_name}
          level: CAN_MANAGE
      
      # Resource tags for cost tracking
      tags:
        business_unit: HPS
        division: Healthcare
        project: "HPS Clinical Notes"
# HPS Clinical Notes JSL Pipeline - Batch Processing Job
# This job runs the end-to-end modular batch processing pipeline

resources:
  jobs:
    hps_clinical_notes_batch_pipeline:
      name: hps-clinical-notes-batch-pipeline
      description: "Batch processing pipeline for HPS Clinical Notes JSL project"
      
      # Job configuration
      max_concurrent_runs: 1
      timeout_seconds: 21600  # 6 hours timeout
      
      # Email notifications (uncomment and configure as needed)
      #email_notifications:
      #  on_start:
      #    - sam.hardy@ebosgroup.com
      #  on_success:
      #    - sam.hardy@ebosgroup.com
      #  on_failure:
      #    - sam.hardy@ebosgroup.com
      
      # Parameters (can be overridden at runtime)
      parameters:
        - name: batch_size
          default: "10"
        - name: input_throttle
          default: "100"
        - name: run_name
          default: "batch_pipeline_prod"

      tasks:
        - task_key: batch_processing_task
          notebook_task:
            notebook_path: ${workspace.file_path}/notebooks/development/end_to_end_modular_dev.py
            source: WORKSPACE
          job_cluster_key: jsl_processing_cluster
          
          # Required libraries for JSL processing
          libraries:
            # Python wheel libraries from workspace and volumes
            - whl: /Workspace/HPS_Clinical_Notes_Discover/JSL/spark_ocr-6.2.0rc1-py3-none-any.whl
            - whl: /Volumes/hps_clinical_notes_discover/custom/libraries/spark_nlp_jsl-6.3.0-py3-none-any.whl
            
            # JAR libraries from volumes
            - jar: /Volumes/hps_clinical_notes_discover/custom/libraries/spark-nlp-assembly-6.3.1.jar
            - jar: /Volumes/hps_clinical_notes_discover/custom/libraries/spark-ocr-assembly-6.3.0.jar
            - jar: /Volumes/hps_clinical_notes_discover/custom/libraries/spark-nlp-jsl-6.3.0.jar
            
            # Required Python packages with specific versions
            # - pypi:
            #     package: license-validator==1.10.5
            - pypi:
                package: spark-nlp==6.3.1
            - pypi:
                package: pandas==1.5.3
            - pypi:
                package: numpy==1.26.4
            - pypi:
                package: openpyxl==3.1.5
            - pypi:
                package: RapidFuzz==3.14.3
            - pypi:
                package: opencv-python-headless==4.8.1.78
            - pypi:
                package: azure-storage-blob>=12.19.0
            - pypi:
                package: azure-identity>=1.15.0
            - pypi:
                package: azure-servicebus>=7.11.0
            
      job_clusters:
        - job_cluster_key: jsl_processing_cluster
          new_cluster:
            spark_version: 16.4.x-cpu-ml-scala2.12  # 16.4 LTS ML Runtime with Spark 3.5.2
            node_type_id: Standard_E16_v3  # 16 cores, 128GB RAM
            num_workers: 0  # Single node configuration
            data_security_mode: SINGLE_USER
            runtime_engine: STANDARD
            
            # Resource tags for cost tracking and organization
            custom_tags:
              business_unit: HPS
              division: Healthcare
              project: "HPS Clinical Notes"
              ResourceClass: SingleNode
            
            # Environment variables from key vault via bundle variables (using 10753 license set)
            spark_env_vars:
              SPARK_NLP_LICENSE: ${var.spark_nlp_license}
              SPARK_OCR_LICENSE: ${var.spark_ocr_license}
              AWS_ACCESS_KEY_ID: ${var.aws_access_key_id}
              AWS_SECRET_ACCESS_KEY: ${var.aws_secret_access_key}
            
            # Spark configuration for JSL processing
            spark_conf:
              # Required single node cluster configuration
              spark.databricks.cluster.profile: singleNode
              spark.master: "local[*]"
              
              # JSL-specific configurations
              spark.sql.legacy.allowUntypedScalaUDF: "true"
              spark.databricks.unityCatalog.volumes.enabled: "true"
              spark.rpc.message.maxSize: "1024"
              
              # Enhanced JVM garbage collection optimization
              spark.driver.extraJavaOptions: "-XX:+UseG1GC -XX:MaxGCPauseMillis=200 -XX:+AlwaysPreTouch -XX:G1HeapRegionSize=32M"
              spark.executor.extraJavaOptions: "-XX:+UseG1GC -XX:MaxGCPauseMillis=200 -XX:+AlwaysPreTouch -XX:G1HeapRegionSize=32M"
              
              # Spark performance optimization
              spark.serializer: "org.apache.spark.serializer.KryoSerializer"
              spark.sql.adaptive.enabled: "true"
              spark.sql.adaptive.coalescePartitions.enabled: "true"
              
              # Memory configurations
              spark.driver.memory: "32g"
              spark.driver.memoryOverhead: "32g"
              spark.memory.offHeap.enabled: "true"
              spark.memory.offHeap.size: "10g"
              spark.kryoserializer.buffer.max: "2000M"
              spark.driver.maxResultSize: "4g"
              spark.executor.memory: "2g"
              
              # Additional optimizations for JSL workloads
              spark.sql.adaptive.advisoryPartitionSizeInBytes: "128MB"
              spark.sql.adaptive.skewJoin.enabled: "true"
              spark.dynamicAllocation.enabled: "false"
      queue:
        enabled: true
      run_as:
        service_principal_name: ${var.service_principal_name}
      
      # Permissions for job management
      permissions:
        - service_principal_name: ${var.service_principal_name}
          level: CAN_MANAGE
        - user_name: sam.hardy@ebosgroup.com
          level: CAN_MANAGE
        - group_name: ${var.ml_ai_group_name}
          level: CAN_MANAGE
        - group_name: ${var.jsl_group_name}
          level: CAN_MANAGE
        - group_name: ${var.crud_group_name}
          level: CAN_MANAGE

      tags:
        business_unit: HPS
        division: Healthcare
        project: "HPS Clinical Notes"
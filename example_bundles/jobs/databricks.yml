# HPS Clinical Notes JSL Pipeline - Jobs Bundle
# Bundle for deploying batch processing jobs across environments

bundle:
  name: hps_clinical_notes_jobs
  uuid: 32ccbf43-ec23-4b77-bfaf-8d59d354a23a

include:
  - resources/*.yml

# Sync shared directories from parent project
sync:
  paths:
    - ../../notebooks
    - ../../src

# Variable declarations for environment-specific configurations
variables:
  ml_ai_group_name:
    description: AD group for ML AI team
    default: HPS_Clinical_Notes_Discover_MLAI_Group
  jsl_group_name:
    description: AD group for JSL team
    default: HPS_Clinical_Notes_Discover_JSL_Group
  crud_group_name:
    description: AD group for CRUD team
    default: HPS_Clinical_Notes_Discover_CRUD_Group
  catalog:
    description: The catalog to use
    default: hive_metastore
  schema:
    description: The schema to use
    default: default
  service_principal_name:
    description: Service principal name for the environment
    default: c8c4498a-fd58-45b7-a8c7-39f91f385dbf
  
  # Key vault secrets for JSL processing (using 10753 license set)
  spark_nlp_license:
    description: Spark NLP license key from key vault (10753)
    default: "{{secrets/prod_ml_secret_scope/10753-spark-nlp-license}}"
  spark_ocr_license:
    description: Spark OCR license key from key vault (10753)
    default: "{{secrets/prod_ml_secret_scope/10753-spark-ocr-license}}"
  aws_access_key_id:
    description: AWS access key ID from key vault (10753)
    default: "{{secrets/prod_ml_secret_scope/10753-aws-access-key-id}}"
  aws_secret_access_key:
    description: AWS secret access key from key vault (10753)
    default: "{{secrets/prod_ml_secret_scope/10753-aws-secret-access-key}}"
  
  # Endpoint scaling configuration for scheduling jobs
  endpoint_min_concurrency:
    description: Minimum endpoint concurrency (0 for scale-to-zero)
    default: 0
  endpoint_max_concurrency:
    description: Maximum endpoint concurrency
    default: 4

targets:
  dev-sp:
    mode: development
    workspace:
      host: https://adb-3971167982293260.0.azuredatabricks.net  # TODO: Update when dev env available
      root_path: /Workspace/Users/c8c4498a-fd58-45b7-a8c7-39f91f385dbf/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: hive_metastore
      schema: dev
      service_principal_name: <TBD-DEV-SP>  # Different SP for dev environment
      ml_ai_group_name: HPS_Clinical_Notes_Discover_MLAI_Group
      jsl_group_name: HPS_Clinical_Notes_Discover_JSL_Group
      crud_group_name: HPS_Clinical_Notes_Discover_CRUD_Group
      # Dev environment secrets (using dev secret scope and licenses)
      spark_nlp_license: "{{secrets/dev_ml_secret_scope/<TBD>}}"
      spark_ocr_license: "{{secrets/dev_ml_secret_scope/<TBD>}}"
      aws_access_key_id: "{{secrets/dev_ml_secret_scope/<TBD>}}"
      aws_secret_access_key: "{{secrets/dev_ml_secret_scope/<TBD>}}"
      # Endpoint configuration for dev
      endpoint_min_concurrency: 0
      endpoint_max_concurrency: 4
    # Override scheduling - keep jobs paused in dev
    resources:
      jobs:
        endpoint_morning_startup:
          schedule:
            pause_status: "PAUSED"
        endpoint_evening_shutdown:
          schedule:
            pause_status: "PAUSED"
    run_as:
      service_principal_name: ${var.service_principal_name}

  test-sp:
    mode: development
    workspace:
      host: https://adb-3971167982293260.0.azuredatabricks.net  # TODO: Update when test env available
      root_path: /Workspace/Users/c8c4498a-fd58-45b7-a8c7-39f91f385dbf/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: hive_metastore
      schema: test
      service_principal_name: <TBD-TEST-SP>  # Different SP for test environment
      ml_ai_group_name: HPS_Clinical_Notes_Discover_MLAI_Group
      jsl_group_name: HPS_Clinical_Notes_Discover_JSL_Group
      crud_group_name: HPS_Clinical_Notes_Discover_CRUD_Group
      # Test environment secrets (using test secret scope and licenses)
      spark_nlp_license: "{{secrets/test_ml_secret_scope/<TBD>}}"
      spark_ocr_license: "{{secrets/test_ml_secret_scope/<TBD>}}"
      aws_access_key_id: "{{secrets/test_ml_secret_scope/<TBD>}}"
      aws_secret_access_key: "{{secrets/test_ml_secret_scope/<TBD>}}"
      # Endpoint configuration for test
      endpoint_min_concurrency: 0
      endpoint_max_concurrency: 4
    # Override scheduling - keep jobs paused in test (change to UNPAUSED for testing)
    resources:
      jobs:
        hps_clinical_notes_endpoint_morning_startup:
          schedule:
            pause_status: "PAUSED"
        hps_clinical_notes_endpoint_evening_shutdown:
          schedule:
            pause_status: "PAUSED"
    run_as:
      service_principal_name: ${var.service_principal_name}

  prod-sp:
    mode: production
    default: true
    workspace:
      host: https://adb-3971167982293260.0.azuredatabricks.net
      root_path: /Workspace/Users/c8c4498a-fd58-45b7-a8c7-39f91f385dbf/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: hive_metastore
      schema: prod
      ml_ai_group_name: HPS_Clinical_Notes_Discover_MLAI_Group
      jsl_group_name: HPS_Clinical_Notes_Discover_JSL_Group
      crud_group_name: HPS_Clinical_Notes_Discover_CRUD_Group
      # Production environment secrets (using prod secret scope and 10753 licenses)
      spark_nlp_license: "{{secrets/prod_ml_secret_scope/10753-spark-nlp-license}}"
      spark_ocr_license: "{{secrets/prod_ml_secret_scope/10753-spark-ocr-license}}"
      aws_access_key_id: "{{secrets/prod_ml_secret_scope/10753-aws-access-key-id}}"
      aws_secret_access_key: "{{secrets/prod_ml_secret_scope/10753-aws-secret-access-key}}"
      # Production endpoint configuration
      endpoint_min_concurrency: 0
      endpoint_max_concurrency: 4
    # Override scheduling - enable automated scheduling in production  
    resources:
      jobs:
        hps_clinical_notes_endpoint_morning_startup:
          schedule:
            pause_status: "PAUSED"
        hps_clinical_notes_endpoint_evening_shutdown:
          schedule:
            pause_status: "PAUSED" # UNPAUSED to enable scheduling in production
    run_as:
      service_principal_name: ${var.service_principal_name}
bundle:
  name: document_intelligence_annotator_app

include:
  - resources/*.yml

sync:
  paths:
    - ../../../..  # repo root so use_cases/* and data/ are available

variables:
  workspace_bundle_root:
    description: Workspace home for bundle.state path; override for SP-owned home (see uc_foundation bundle)
    default: /Workspace/Users/sam.hardy@ebosgroup.com

  bundle_deploying_user_name:
    description: Human user for bundle CAN_MANAGE permissions alongside run_as SP
    default: sam.hardy@ebosgroup.com

  app_workspace_root:
    description: Workspace root path for the app bundle
    default: ${var.workspace_bundle_root}/.bundle/${bundle.name}/${bundle.target}
  docint_base_dir:
    description: Base directory used by the annotator (documents/, predictions/, annotated/).
    default: ${var.app_workspace_root}/data/local/prescription_pdfs
  service_principal_name:
    description: Service principal name for this environment (run_as)
    default: c8c4498a-fd58-45b7-a8c7-39f91f385dbf

targets:
  dev-sp:
    mode: development
    default: true
    workspace:
      host: https://dbc-f501771e-54b7.cloud.databricks.com
      root_path: ${var.workspace_bundle_root}/.bundle/${bundle.name}/${bundle.target}
    variables:
      app_workspace_root: ${var.workspace_bundle_root}/.bundle/${bundle.name}/${bundle.target}
      docint_base_dir: ${var.workspace_bundle_root}/.bundle/${bundle.name}/${bundle.target}/data/local/prescription_pdfs
      service_principal_name: <TBD-DOCINT-DEV-SP>
    run_as:
      service_principal_name: ${var.service_principal_name}
    permissions:
      - user_name: ${var.bundle_deploying_user_name}
        level: CAN_MANAGE
      - service_principal_name: ${var.service_principal_name}
        level: CAN_MANAGE

  test-sp:
    mode: development
    workspace:
      host: https://dbc-f501771e-54b7.cloud.databricks.com
      root_path: ${var.workspace_bundle_root}/.bundle/${bundle.name}/${bundle.target}
    variables:
      app_workspace_root: ${var.workspace_bundle_root}/.bundle/${bundle.name}/${bundle.target}
      docint_base_dir: ${var.workspace_bundle_root}/.bundle/${bundle.name}/${bundle.target}/data/local/prescription_pdfs
      service_principal_name: <TBD-DOCINT-TEST-SP>
    run_as:
      service_principal_name: ${var.service_principal_name}
    permissions:
      - user_name: ${var.bundle_deploying_user_name}
        level: CAN_MANAGE
      - service_principal_name: ${var.service_principal_name}
        level: CAN_MANAGE

  prod-sp:
    mode: production
    workspace:
      host: https://dbc-f501771e-54b7.cloud.databricks.com
      root_path: ${var.workspace_bundle_root}/.bundle/${bundle.name}/${bundle.target}
    variables:
      app_workspace_root: ${var.workspace_bundle_root}/.bundle/${bundle.name}/${bundle.target}
      docint_base_dir: ${var.workspace_bundle_root}/.bundle/${bundle.name}/${bundle.target}/data/local/prescription_pdfs
      service_principal_name: <TBD-DOCINT-PROD-SP>
    run_as:
      service_principal_name: ${var.service_principal_name}
    permissions:
      - user_name: ${var.bundle_deploying_user_name}
        level: CAN_MANAGE
      - service_principal_name: ${var.service_principal_name}
        level: CAN_MANAGE


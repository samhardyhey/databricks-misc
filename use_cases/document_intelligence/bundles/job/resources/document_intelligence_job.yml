# Document intelligence: two separate jobs.
# Local: DOCINT_DATA_SOURCE=local → documents/ and predictions/ under DOCINT_BASE_DIR.
# Remote (Databricks): DOCINT_DATA_SOURCE=catalog → documents on UC volume, predictions in UC tables.

resources:
  jobs:
    document_intelligence_generate_job:
      name: document_intelligence_generate_job
      description: "Generate prescription PDFs. Local: write to base_dir/documents. Catalog: upload to UC volume."
      tags:
        business_unit: ebos
        workload: ds-ml-demo
        uc_catalog: ebos_uc_demo
        repository: databricks-misc
        bundle: document_intelligence
        deployment_environment: ${var.tag_environment}

      schedule:
        quartz_cron_expression: "0 0 4 * * ?"  # daily 4am (before pipeline)
        timezone_id: Australia/Sydney
        pause_status: PAUSED

      tasks:
        - task_key: generate_data
          spark_python_task:
            python_file: use_cases/document_intelligence/jobs/1_generate_data.py
          environment_key: generate_env

      environments:
        - environment_key: generate_env
          spec:
            client: "2"
            env_vars:
              DOCINT_DATA_SOURCE: ${var.docint_data_source}
              DOCINT_BASE_DIR: ${var.docint_base_dir}
              DOCINT_DOCUMENTS_VOLUME: ${var.docint_documents_volume}
              DOCINT_NUM_PDFS: ${var.docint_num_pdfs}
              PYTHONPATH: ${var.workspace_root}
            dependencies:
              - loguru>=0.7
              - faker>=19.0
              - reportlab>=4.0

    document_intelligence_pipeline_job:
      name: document_intelligence_pipeline_job
      description: "OCR then field extraction. Local: read/write under base_dir. Catalog: volume + UC tables."
      tags:
        business_unit: ebos
        workload: ds-ml-demo
        uc_catalog: ebos_uc_demo
        repository: databricks-misc
        bundle: document_intelligence
        deployment_environment: ${var.tag_environment}

      schedule:
        quartz_cron_expression: "0 0 5 * * ?"  # daily 5am (after generate)
        timezone_id: Australia/Sydney
        pause_status: PAUSED

      tasks:
        - task_key: ocr_extraction
          spark_python_task:
            python_file: use_cases/document_intelligence/jobs/2_ocr_extraction.py
          environment_key: pipeline_env

        - task_key: field_extraction
          depends_on:
            - task_key: ocr_extraction
          spark_python_task:
            python_file: use_cases/document_intelligence/jobs/3_field_extraction.py
          environment_key: pipeline_env

      environments:
        - environment_key: pipeline_env
          spec:
            client: "2"
            env_vars:
              DOCINT_DATA_SOURCE: ${var.docint_data_source}
              DOCINT_BASE_DIR: ${var.docint_base_dir}
              DOCINT_CATALOG_SCHEMA: ${var.docint_catalog_schema}
              DOCINT_DOCUMENTS_VOLUME: ${var.docint_documents_volume}
              PYTHONPATH: ${var.workspace_root}
            dependencies:
              - pandas>=2.0
              - loguru>=0.7
              - pdfplumber>=0.11
              - spacy>=3.8.0,<3.9
              - https://github.com/explosion/spacy-models/releases/download/en_core_web_sm-3.8.0/en_core_web_sm-3.8.0-py3-none-any.whl

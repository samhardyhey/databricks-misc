# Document intelligence bundle (co-located with use case code).
# Deploy: databricks bundle deploy -t dev-sp (from this directory or repo root).
bundle:
  name: document_intelligence
  uuid: d0c1b2a3-4e5f-6789-abcd-0123456789ef

include:
  - resources/*.yml

sync:
  paths:
    - ../../../..  # repo root so use_cases/* and data/ are available

variables:
  catalog:
    description: Unity Catalog for document medallion (future extension)
    default: workspace
  medallion_schema:
    description: Catalog.schema for document intelligence tables (e.g. workspace.document_intelligence_medallion_dev)
    default: workspace.document_intelligence_medallion_dev
  workspace_root:
    description: Workspace path where bundle is deployed (for PYTHONPATH)
    default: ""
  docint_base_dir:
    description: Local base dir (documents/, predictions/, annotated/). Used when DOCINT_DATA_SOURCE=local.
    default: /Workspace/Users/samhardyhey@gmail.com/prescription_pdfs
  docint_num_pdfs:
    description: Number of prescription PDFs to generate (DOCINT_NUM_PDFS)
    default: "10"
  docint_data_source:
    description: "local (files) or catalog (UC volume + tables). Remote jobs use catalog."
    default: catalog
  docint_catalog_schema:
    description: Unity Catalog schema for doc intelligence tables (e.g. silver_doc_pages, silver_doc_fields_extracted)
    default: workspace.document_intelligence_medallion_dev
  docint_documents_volume:
    description: UC managed volume path for prescription PDFs (e.g. /Volumes/workspace/document_intelligence/prescription_documents)
    default: /Volumes/workspace/document_intelligence/prescription_documents

targets:
  dev-sp:
    mode: development
    default: true
    workspace:
      host: https://dbc-f501771e-54b7.cloud.databricks.com
      root_path: /Workspace/Users/samhardyhey@gmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: workspace
      medallion_schema: workspace.document_intelligence_medallion_dev
      workspace_root: /Workspace/Users/samhardyhey@gmail.com/.bundle/${bundle.name}/${bundle.target}
      docint_base_dir: /Workspace/Users/samhardyhey@gmail.com/prescription_pdfs
      docint_num_pdfs: "10"
      docint_data_source: catalog
      docint_catalog_schema: workspace.document_intelligence_medallion_dev
      docint_documents_volume: /Volumes/workspace/document_intelligence/prescription_documents

  test-sp:
    mode: development
    workspace:
      host: https://dbc-f501771e-54b7.cloud.databricks.com
      root_path: /Workspace/Users/samhardyhey@gmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: workspace
      medallion_schema: workspace.document_intelligence_medallion_test
      workspace_root: /Workspace/Users/samhardyhey@gmail.com/.bundle/${bundle.name}/${bundle.target}
      docint_base_dir: /Workspace/Users/samhardyhey@gmail.com/prescription_pdfs
      docint_num_pdfs: "10"
      docint_data_source: catalog
      docint_catalog_schema: workspace.document_intelligence_medallion_test
      docint_documents_volume: /Volumes/workspace/document_intelligence/prescription_documents

  prod-sp:
    mode: production
    workspace:
      host: https://dbc-f501771e-54b7.cloud.databricks.com
      root_path: /Workspace/Users/samhardyhey@gmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: workspace
      medallion_schema: workspace.document_intelligence_medallion_prod
      workspace_root: /Workspace/Users/samhardyhey@gmail.com/.bundle/${bundle.name}/${bundle.target}
      docint_base_dir: /Workspace/Users/samhardyhey@gmail.com/prescription_pdfs
      docint_num_pdfs: "10"
      docint_data_source: catalog
      docint_catalog_schema: workspace.document_intelligence_medallion_prod
      docint_documents_volume: /Volumes/workspace/document_intelligence/prescription_documents

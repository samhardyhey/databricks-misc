# Document intelligence bundle (co-located with use case code).
# Deploy: databricks bundle deploy -t dev-sp (from this directory or repo root).
bundle:
  name: document_intelligence
  uuid: d0c1b2a3-4e5f-6789-abcd-0123456789ef

include:
  - resources/*.yml

sync:
  paths:
    - ../../../..  # repo root so use_cases/* and data/ are available

variables:
  catalog:
    description: Unity Catalog for document intelligence (demonstration shared catalog)
    default: ebos_uc_demo
  tag_environment:
    description: Deployment tier for job tags (dev / test / prod)
    default: dev
  medallion_schema:
    description: Catalog.schema for document intelligence tables (e.g. ebos_uc_demo.document_intelligence_dev)
    default: ebos_uc_demo.document_intelligence_dev

  workspace_bundle_root:
    description: Workspace home for bundle.state and default DOCINT_BASE_DIR prefix (see uc_foundation bundle)
    default: /Workspace/Users/sam.hardy@ebosgroup.com

  bundle_deploying_user_name:
    description: Human user for bundle CAN_MANAGE permissions alongside run_as SP
    default: sam.hardy@ebosgroup.com

  workspace_root:
    description: Workspace path where bundle is deployed (for PYTHONPATH)
    default: ""
  docint_base_dir:
    description: Local base dir (documents/, predictions/, annotated/). Used when DOCINT_DATA_SOURCE=local.
    default: ${var.workspace_bundle_root}/data/local/prescription_pdfs
  docint_num_pdfs:
    description: Number of prescription PDFs to generate (DOCINT_NUM_PDFS)
    default: "10"
  docint_data_source:
    description: "local (files) or catalog (UC volume + tables). Remote jobs use catalog."
    default: catalog
  docint_catalog_schema:
    description: Unity Catalog schema for doc intelligence tables (e.g. silver_doc_pages, silver_doc_fields_extracted)
    default: ebos_uc_demo.document_intelligence_dev
  docint_documents_volume:
    description: UC managed volume path for prescription PDFs (e.g. /Volumes/ebos_uc_demo/document_intelligence_dev/prescription_documents)
    default: /Volumes/ebos_uc_demo/document_intelligence_dev/prescription_documents
  service_principal_name:
    description: Service principal for job run_as and bundle resource permissions
    default: c8c4498a-fd58-45b7-a8c7-39f91f385dbf

targets:
  dev-sp:
    mode: development
    default: true
    workspace:
      host: https://dbc-f501771e-54b7.cloud.databricks.com
      root_path: ${var.workspace_bundle_root}/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: ebos_uc_demo
      tag_environment: dev
      medallion_schema: ebos_uc_demo.document_intelligence_dev
      workspace_root: ${var.workspace_bundle_root}/.bundle/${bundle.name}/${bundle.target}
      docint_base_dir: ${var.workspace_bundle_root}/data/local/prescription_pdfs
      docint_num_pdfs: "10"
      docint_data_source: catalog
      docint_catalog_schema: ebos_uc_demo.document_intelligence_dev
      docint_documents_volume: /Volumes/ebos_uc_demo/document_intelligence_dev/prescription_documents
      service_principal_name: <TBD-DOCINT-JOB-DEV-SP>
    run_as:
      service_principal_name: ${var.service_principal_name}
    permissions:
      - user_name: ${var.bundle_deploying_user_name}
        level: CAN_MANAGE
      - service_principal_name: ${var.service_principal_name}
        level: CAN_MANAGE

  test-sp:
    mode: development
    workspace:
      host: https://dbc-f501771e-54b7.cloud.databricks.com
      root_path: ${var.workspace_bundle_root}/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: ebos_uc_demo
      tag_environment: test
      medallion_schema: ebos_uc_demo.document_intelligence_test
      workspace_root: ${var.workspace_bundle_root}/.bundle/${bundle.name}/${bundle.target}
      docint_base_dir: ${var.workspace_bundle_root}/data/local/prescription_pdfs
      docint_num_pdfs: "10"
      docint_data_source: catalog
      docint_catalog_schema: ebos_uc_demo.document_intelligence_test
      docint_documents_volume: /Volumes/ebos_uc_demo/document_intelligence_test/prescription_documents
      service_principal_name: <TBD-DOCINT-JOB-TEST-SP>
    run_as:
      service_principal_name: ${var.service_principal_name}
    permissions:
      - user_name: ${var.bundle_deploying_user_name}
        level: CAN_MANAGE
      - service_principal_name: ${var.service_principal_name}
        level: CAN_MANAGE

  prod-sp:
    mode: production
    workspace:
      host: https://dbc-f501771e-54b7.cloud.databricks.com
      root_path: ${var.workspace_bundle_root}/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: ebos_uc_demo
      tag_environment: prod
      medallion_schema: ebos_uc_demo.document_intelligence_prod
      workspace_root: ${var.workspace_bundle_root}/.bundle/${bundle.name}/${bundle.target}
      docint_base_dir: ${var.workspace_bundle_root}/data/local/prescription_pdfs
      docint_num_pdfs: "10"
      docint_data_source: catalog
      docint_catalog_schema: ebos_uc_demo.document_intelligence_prod
      docint_documents_volume: /Volumes/ebos_uc_demo/document_intelligence_prod/prescription_documents
      service_principal_name: <TBD-DOCINT-JOB-PROD-SP>
    run_as:
      service_principal_name: ${var.service_principal_name}
    permissions:
      - user_name: ${var.bundle_deploying_user_name}
        level: CAN_MANAGE
      - service_principal_name: ${var.service_principal_name}
        level: CAN_MANAGE

# Document intelligence bundle (co-located with use case code).
# Deploy: databricks bundle deploy -t dev-sp (from this directory or repo root).
bundle:
  name: document_intelligence
  uuid: d0c1b2a3-4e5f-6789-abcd-0123456789ef

include:
  - ../../resources/*_job.yml

sync:
  paths:
    - ../../../..  # repo root so use_cases/* and data/ are available

variables:
  catalog:
    description: Unity Catalog for document medallion (future extension)
    default: workspace
  medallion_schema:
    description: Catalog.schema for document intelligence tables (e.g. workspace.document_intelligence_medallion_dev)
    default: workspace.document_intelligence_medallion_dev
  workspace_root:
    description: Workspace path where bundle is deployed (for PYTHONPATH)
    default: ""

targets:
  dev-sp:
    mode: development
    default: true
    workspace:
      host: https://dbc-f501771e-54b7.cloud.databricks.com
      root_path: /Workspace/Users/samhardyhey@gmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: workspace
      medallion_schema: workspace.document_intelligence_medallion_dev
      workspace_root: /Workspace/Users/samhardyhey@gmail.com/.bundle/${bundle.name}/${bundle.target}

  test-sp:
    mode: development
    workspace:
      host: https://dbc-f501771e-54b7.cloud.databricks.com
      root_path: /Workspace/Users/samhardyhey@gmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: workspace
      medallion_schema: workspace.document_intelligence_medallion_test
      workspace_root: /Workspace/Users/samhardyhey@gmail.com/.bundle/${bundle.name}/${bundle.target}

  prod-sp:
    mode: production
    workspace:
      host: https://dbc-f501771e-54b7.cloud.databricks.com
      root_path: /Workspace/Users/samhardyhey@gmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: workspace
      medallion_schema: workspace.document_intelligence_medallion_prod
      workspace_root: /Workspace/Users/samhardyhey@gmail.com/.bundle/${bundle.name}/${bundle.target}


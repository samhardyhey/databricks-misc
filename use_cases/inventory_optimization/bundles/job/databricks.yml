# Inventory optimization bundle (co-located with use case code).
# Deploy: databricks bundle deploy -t dev-sp (from this directory or repo root).
bundle:
  name: inventory_optimization
  uuid: b2c3d4e5-f6a7-4b8c-9d0e-1f2a3b4c5d6e

include:
  - resources/*.yml

sync:
  paths:
    - ../../../..  # repo root so use_cases/* and data/ are available

variables:
  catalog:
    description: Unity Catalog for medallion (inventory reads from medallion schema)
    default: ebos_uc_demo
  tag_environment:
    description: Deployment tier for job tags (dev / test / prod)
    default: dev
  medallion_bronze_schema:
    description: Shared medallion bronze schema (inputs), e.g. ebos_uc_demo.healthcare_medallion_dev_bronze
    default: ebos_uc_demo.healthcare_medallion_dev_bronze
  medallion_silver_schema:
    description: Shared medallion silver schema (inputs), e.g. ebos_uc_demo.healthcare_medallion_dev_silver
    default: ebos_uc_demo.healthcare_medallion_dev_silver
  medallion_gold_schema:
    description: Shared medallion gold schema (inputs), e.g. ebos_uc_demo.healthcare_medallion_dev_gold
    default: ebos_uc_demo.healthcare_medallion_dev_gold
  output_schema:
    description: Inventory-owned output schema, e.g. ebos_uc_demo.inventory_optimization_dev
    default: ebos_uc_demo.inventory_optimization_dev
  workspace_root:
    description: Workspace path where bundle is deployed (for PYTHONPATH)
    default: ""
  service_principal_name:
    description: Service principal name for this environment (matches example endpoints bundle pattern)
    default: c8c4498a-fd58-45b7-a8c7-39f91f385dbf

targets:
  dev-sp:
    mode: development
    default: true
    workspace:
      host: https://dbc-f501771e-54b7.cloud.databricks.com
      root_path: /Workspace/Users/sam.hardy@ebosgroup.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: ebos_uc_demo
      tag_environment: dev
      medallion_bronze_schema: ebos_uc_demo.healthcare_medallion_dev_bronze
      medallion_silver_schema: ebos_uc_demo.healthcare_medallion_dev_silver
      medallion_gold_schema: ebos_uc_demo.healthcare_medallion_dev_gold
      output_schema: ebos_uc_demo.inventory_optimization_dev
      workspace_root: /Workspace/Users/sam.hardy@ebosgroup.com/.bundle/${bundle.name}/${bundle.target}
      service_principal_name: <TBD-INVENTORY-DEV-SP>
    run_as:
      service_principal_name: ${var.service_principal_name}
    permissions:
      - user_name: sam.hardy@ebosgroup.com
        level: CAN_MANAGE
      - service_principal_name: ${var.service_principal_name}
        level: CAN_MANAGE

  test-sp:
    mode: development
    workspace:
      host: https://dbc-f501771e-54b7.cloud.databricks.com
      root_path: /Workspace/Users/sam.hardy@ebosgroup.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: ebos_uc_demo
      tag_environment: test
      medallion_bronze_schema: ebos_uc_demo.healthcare_medallion_test_bronze
      medallion_silver_schema: ebos_uc_demo.healthcare_medallion_test_silver
      medallion_gold_schema: ebos_uc_demo.healthcare_medallion_test_gold
      output_schema: ebos_uc_demo.inventory_optimization_test
      workspace_root: /Workspace/Users/sam.hardy@ebosgroup.com/.bundle/${bundle.name}/${bundle.target}
      service_principal_name: <TBD-INVENTORY-TEST-SP>
    run_as:
      service_principal_name: ${var.service_principal_name}
    permissions:
      - user_name: sam.hardy@ebosgroup.com
        level: CAN_MANAGE
      - service_principal_name: ${var.service_principal_name}
        level: CAN_MANAGE

  prod-sp:
    mode: production
    workspace:
      host: https://dbc-f501771e-54b7.cloud.databricks.com
      root_path: /Workspace/Users/sam.hardy@ebosgroup.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: ebos_uc_demo
      tag_environment: prod
      medallion_bronze_schema: ebos_uc_demo.healthcare_medallion_prod_bronze
      medallion_silver_schema: ebos_uc_demo.healthcare_medallion_prod_silver
      medallion_gold_schema: ebos_uc_demo.healthcare_medallion_prod_gold
      output_schema: ebos_uc_demo.inventory_optimization_prod
      workspace_root: /Workspace/Users/sam.hardy@ebosgroup.com/.bundle/${bundle.name}/${bundle.target}
      service_principal_name: <TBD-INVENTORY-PROD-SP>
    run_as:
      service_principal_name: ${var.service_principal_name}
    permissions:
      - user_name: sam.hardy@ebosgroup.com
        level: CAN_MANAGE
      - service_principal_name: ${var.service_principal_name}
        level: CAN_MANAGE


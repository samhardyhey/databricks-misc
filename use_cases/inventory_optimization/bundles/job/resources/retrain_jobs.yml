# Inventory optimisation retrain jobs: one job per model
resources:
  jobs:
    inventory_demand_forecasting_retrain:
      name: inventory_demand_forecasting_retrain
      description: "Retrain demand forecasting models for inventory optimisation and log to MLflow"
      tags:
        business_unit: ebos
        workload: ds-ml-demo
        uc_catalog: ebos_uc_demo
        repository: databricks-misc
        bundle: inventory_optimization
        deployment_environment: ${var.tag_environment}

      schedule:
        quartz_cron_expression: "0 0 5 * * ?"  # daily 5am
        timezone_id: Australia/Sydney
        pause_status: PAUSED

      tasks:
        - task_key: retrain_demand_forecasting
          spark_python_task:
            python_file: use_cases/inventory_optimization/jobs/1_demand_forecasting.py
          environment_key: retrain_env

      environments:
        - environment_key: retrain_env
          spec:
            client: "2"
            env_vars:
              INVENTORY_DATA_SOURCE: auto
              INVENTORY_INPUT_BRONZE_SCHEMA: ${var.medallion_bronze_schema}
              INVENTORY_INPUT_SILVER_SCHEMA: ${var.medallion_silver_schema}
              INVENTORY_INPUT_GOLD_SCHEMA: ${var.medallion_gold_schema}
              INVENTORY_OUTPUT_SCHEMA: ${var.output_schema}
              PYTHONPATH: ${var.workspace_root}
            dependencies:
              - pandas>=2.0
              - scikit-learn>=1.3
              - loguru>=0.7
              - scipy>=1.10
              - lightgbm>=4.0
              - mlflow>=2.9.0
              # Optional demand-forecasting stack (if you wire it in this job)
              - statsmodels>=0.14
              - prophet>=1.1
              - xgboost>=2.0

    inventory_writeoff_risk_retrain:
      name: inventory_writeoff_risk_retrain
      description: "Retrain write-off risk classifier for inventory and log to MLflow"
      tags:
        business_unit: ebos
        workload: ds-ml-demo
        uc_catalog: ebos_uc_demo
        repository: databricks-misc
        bundle: inventory_optimization
        deployment_environment: ${var.tag_environment}

      schedule:
        quartz_cron_expression: "0 10 5 * * ?"  # daily 5:10am
        timezone_id: Australia/Sydney
        pause_status: PAUSED

      tasks:
        - task_key: retrain_writeoff_risk
          spark_python_task:
            python_file: use_cases/inventory_optimization/jobs/2_writeoff_risk_model.py
          environment_key: retrain_env

      environments:
        - environment_key: retrain_env
          spec:
            client: "2"
            env_vars:
              INVENTORY_DATA_SOURCE: auto
              INVENTORY_INPUT_BRONZE_SCHEMA: ${var.medallion_bronze_schema}
              INVENTORY_INPUT_SILVER_SCHEMA: ${var.medallion_silver_schema}
              INVENTORY_INPUT_GOLD_SCHEMA: ${var.medallion_gold_schema}
              INVENTORY_OUTPUT_SCHEMA: ${var.output_schema}
              PYTHONPATH: ${var.workspace_root}
            dependencies:
              - pandas>=2.0
              - scikit-learn>=1.3
              - loguru>=0.7
              - scipy>=1.10
              - lightgbm>=4.0
              - mlflow>=2.9.0
              - statsmodels>=0.14
              - prophet>=1.1
              - xgboost>=2.0

    inventory_replenishment_retrain:
      name: inventory_replenishment_retrain
      description: "Recompute replenishment policy (safety stock / ROP) based on latest demand models"
      tags:
        business_unit: ebos
        workload: ds-ml-demo
        uc_catalog: ebos_uc_demo
        repository: databricks-misc
        bundle: inventory_optimization
        deployment_environment: ${var.tag_environment}

      schedule:
        quartz_cron_expression: "0 20 5 * * ?"  # daily 5:20am
        timezone_id: Australia/Sydney
        pause_status: PAUSED

      tasks:
        - task_key: recompute_replenishment_policy
          # Uses the same pipeline as batch apply; treated as 'retrain' of ROP policy.
          spark_python_task:
            python_file: use_cases/inventory_optimization/jobs/3_replenishment_optimization.py
          environment_key: retrain_env

      environments:
        - environment_key: retrain_env
          spec:
            client: "2"
            env_vars:
              INVENTORY_DATA_SOURCE: auto
              INVENTORY_INPUT_BRONZE_SCHEMA: ${var.medallion_bronze_schema}
              INVENTORY_INPUT_SILVER_SCHEMA: ${var.medallion_silver_schema}
              INVENTORY_INPUT_GOLD_SCHEMA: ${var.medallion_gold_schema}
              INVENTORY_OUTPUT_SCHEMA: ${var.output_schema}
              PYTHONPATH: ${var.workspace_root}
            dependencies:
              - pandas>=2.0
              - scikit-learn>=1.3
              - loguru>=0.7
              - scipy>=1.10
              - lightgbm>=4.0
              - mlflow>=2.9.0
              - statsmodels>=0.14
              - prophet>=1.1
              - xgboost>=2.0

# Inventory optimisation batch application jobs: one job per model
resources:
  jobs:
    inventory_demand_forecasting_apply:
      name: inventory_demand_forecasting_apply
      description: "Batch application of demand forecasting models (e.g. write gold_demand_forecast table)"
      tags:
        business_unit: ebos
        workload: ds-ml-demo
        uc_catalog: ebos_uc_demo
        repository: databricks-misc
        bundle: inventory_optimization
        deployment_environment: ${var.tag_environment}

      schedule:
        quartz_cron_expression: "0 0 6 * * ?"  # daily 6am
        timezone_id: Australia/Sydney
        pause_status: PAUSED

      tasks:
        - task_key: apply_demand_forecasting
          # Currently reuses the same entrypoint; in future can be split into a pure 'apply' script.
          spark_python_task:
            python_file: use_cases/inventory_optimization/jobs/1_demand_forecasting.py
          environment_key: apply_env

      environments:
        - environment_key: apply_env
          spec:
            client: "2"
            env_vars:
              INVENTORY_DATA_SOURCE: auto
              INVENTORY_INPUT_BRONZE_SCHEMA: ${var.medallion_bronze_schema}
              INVENTORY_INPUT_SILVER_SCHEMA: ${var.medallion_silver_schema}
              INVENTORY_INPUT_GOLD_SCHEMA: ${var.medallion_gold_schema}
              INVENTORY_OUTPUT_SCHEMA: ${var.output_schema}
              PYTHONPATH: ${var.workspace_root}
            dependencies:
              - pandas>=2.0
              - scikit-learn>=1.3
              - loguru>=0.7
              - scipy>=1.10
              - lightgbm>=4.0

    inventory_writeoff_risk_apply:
      name: inventory_writeoff_risk_apply
      description: "Batch scoring of inventory write-off risk (e.g. write gold_writeoff_risk_scores table)"
      tags:
        business_unit: ebos
        workload: ds-ml-demo
        uc_catalog: ebos_uc_demo
        repository: databricks-misc
        bundle: inventory_optimization
        deployment_environment: ${var.tag_environment}

      schedule:
        quartz_cron_expression: "0 10 6 * * ?"  # daily 6:10am
        timezone_id: Australia/Sydney
        pause_status: PAUSED

      tasks:
        - task_key: apply_writeoff_risk
          # Currently reuses the same entrypoint; in future can be split into a pure 'apply' script.
          spark_python_task:
            python_file: use_cases/inventory_optimization/jobs/2_writeoff_risk_model.py
          environment_key: apply_env

      environments:
        - environment_key: apply_env
          spec:
            client: "2"
            env_vars:
              INVENTORY_DATA_SOURCE: auto
              INVENTORY_INPUT_BRONZE_SCHEMA: ${var.medallion_bronze_schema}
              INVENTORY_INPUT_SILVER_SCHEMA: ${var.medallion_silver_schema}
              INVENTORY_INPUT_GOLD_SCHEMA: ${var.medallion_gold_schema}
              INVENTORY_OUTPUT_SCHEMA: ${var.output_schema}
              PYTHONPATH: ${var.workspace_root}
              WRITEOFF_RISK_MODEL_URI: models:/inventory_optimization-writeoff_risk@Champion
            dependencies:
              - pandas>=2.0
              - scikit-learn>=1.3
              - loguru>=0.7
              - scipy>=1.10
              - lightgbm>=4.0
              - mlflow>=2.9.0

    inventory_replenishment_apply:
      name: inventory_replenishment_apply
      description: "Batch application of replenishment optimisation and write gold_replenishment_recommendations"
      tags:
        business_unit: ebos
        workload: ds-ml-demo
        uc_catalog: ebos_uc_demo
        repository: databricks-misc
        bundle: inventory_optimization
        deployment_environment: ${var.tag_environment}

      schedule:
        quartz_cron_expression: "0 20 6 * * ?"  # daily 6:20am
        timezone_id: Australia/Sydney
        pause_status: PAUSED

      tasks:
        - task_key: apply_replenishment
          spark_python_task:
            python_file: use_cases/inventory_optimization/jobs/3_replenishment_optimization.py
          environment_key: apply_env

      environments:
        - environment_key: apply_env
          spec:
            client: "2"
            env_vars:
              INVENTORY_DATA_SOURCE: auto
              INVENTORY_INPUT_BRONZE_SCHEMA: ${var.medallion_bronze_schema}
              INVENTORY_INPUT_SILVER_SCHEMA: ${var.medallion_silver_schema}
              INVENTORY_INPUT_GOLD_SCHEMA: ${var.medallion_gold_schema}
              INVENTORY_OUTPUT_SCHEMA: ${var.output_schema}
              PYTHONPATH: ${var.workspace_root}
            dependencies:
              - pandas>=2.0
              - scikit-learn>=1.3
              - loguru>=0.7
              - scipy>=1.10
              - lightgbm>=4.0

#
# Inventory optimisation DAB jobs:
# - inventory_training_job: trains demand forecasting (optional), write-off risk classifier, logs to MLflow
# - inventory_apply_job: runs replenishment optimisation and writes gold_replenishment_recommendations
#
resources:
  jobs:
    inventory_training_job:
      name: inventory_training_job
      description: "Train inventory models (demand forecasting, writeoff risk) and log to MLflow"

      schedule:
        quartz_cron_expression: "0 0 6 * * ?"  # daily 6am, before apply
        timezone_id: Australia/Sydney
        pause_status: PAUSED

      tasks:
        - task_key: demand_forecasting
          # Optional: reuse demand_forecasting module when available
          spark_python_task:
            python_file: use_cases/inventory_optimization/jobs/1_demand_forecasting.py
          environment_key: training_env

        - task_key: writeoff_risk_model
          depends_on:
            - task_key: demand_forecasting
          spark_python_task:
            python_file: use_cases/inventory_optimization/jobs/2_writeoff_risk_model.py
          environment_key: training_env

      environments:
        - environment_key: training_env
          spec:
            client: "2"
            env_vars:
              INVENTORY_DATA_SOURCE: auto
              INVENTORY_CATALOG_SCHEMA: ${var.medallion_schema}
              PYTHONPATH: ${var.workspace_root}
            dependencies:
              - pandas>=2.0
              - scikit-learn>=1.3
              - loguru>=0.7
              - scipy>=1.10
              - lightgbm>=4.0
              - mlflow>=2.9.0
              # Optional demand-forecasting stack (if you wire it in this job)
              - statsmodels>=0.14
              - prophet>=1.1
              - xgboost>=2.0

    inventory_apply_job:
      name: inventory_apply_job
      description: "Run replenishment optimisation and write gold_replenishment_recommendations from medallion tables"

      schedule:
        quartz_cron_expression: "0 30 6 * * ?"  # daily 6:30am, after training
        timezone_id: Australia/Sydney
        pause_status: PAUSED

      tasks:
        - task_key: replenishment_optimization
          spark_python_task:
            python_file: use_cases/inventory_optimization/jobs/3_replenishment_optimization.py
          environment_key: apply_env

      environments:
        - environment_key: apply_env
          spec:
            client: "2"
            env_vars:
              INVENTORY_DATA_SOURCE: auto
              INVENTORY_CATALOG_SCHEMA: ${var.medallion_schema}
              PYTHONPATH: ${var.workspace_root}
            dependencies:
              - pandas>=2.0
              - scikit-learn>=1.3
              - loguru>=0.7
              - scipy>=1.10
              - lightgbm>=4.0

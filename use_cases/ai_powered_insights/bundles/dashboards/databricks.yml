# SQL dashboard definitions: align catalog/schema variables with medallion; replace <TBD-...> run_as per env.
bundle:
  name: ai_powered_insights_dashboards
  uuid: 9a4c2f2f-4d9b-4d7a-9b12-0f0d5e2f6c33

include:
  - resources/*.yml

sync:
  paths:
    - ../../../..

variables:
  catalog:
    description: Unity Catalog containing medallion outputs used by the dashboards
    default: ebos_uc_demo
  medallion_bronze_schema:
    description: Medallion bronze schema (UC schema), e.g. healthcare_medallion_dev_bronze
    default: healthcare_medallion_dev_bronze
  medallion_silver_schema:
    description: Medallion silver schema (UC schema), e.g. healthcare_medallion_dev_silver
    default: healthcare_medallion_dev_silver
  warehouse_id:
    description: SQL warehouse ID used to run dashboard queries
    default: ""
  service_principal_name:
    description: Service principal used for run_as
    default: c8c4498a-fd58-45b7-a8c7-39f91f385dbf

  workspace_bundle_root:
    description: Workspace home for bundle.state path; override for SP-owned home (see uc_foundation bundle)
    default: /Workspace/Users/sam.hardy@ebosgroup.com

  bundle_deploying_user_name:
    description: Human user for bundle CAN_MANAGE permissions alongside run_as SP
    default: sam.hardy@ebosgroup.com

targets:
  dev-sp:
    mode: development
    default: true
    workspace:
      host: https://dbc-f501771e-54b7.cloud.databricks.com
      root_path: ${var.workspace_bundle_root}/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: ebos_uc_demo
      medallion_bronze_schema: healthcare_medallion_dev_bronze
      medallion_silver_schema: healthcare_medallion_dev_silver
      warehouse_id: ""
      service_principal_name: <TBD-AI-INSIGHTS-DEV-SP>
    run_as:
      service_principal_name: ${var.service_principal_name}
    permissions:
      - user_name: ${var.bundle_deploying_user_name}
        level: CAN_MANAGE
      - service_principal_name: ${var.service_principal_name}
        level: CAN_MANAGE

  test-sp:
    mode: development
    workspace:
      host: https://dbc-f501771e-54b7.cloud.databricks.com
      root_path: ${var.workspace_bundle_root}/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: ebos_uc_demo
      medallion_bronze_schema: healthcare_medallion_test_bronze
      medallion_silver_schema: healthcare_medallion_test_silver
      warehouse_id: ""
      service_principal_name: <TBD-AI-INSIGHTS-TEST-SP>
    run_as:
      service_principal_name: ${var.service_principal_name}
    permissions:
      - user_name: ${var.bundle_deploying_user_name}
        level: CAN_MANAGE
      - service_principal_name: ${var.service_principal_name}
        level: CAN_MANAGE

  prod-sp:
    mode: production
    workspace:
      host: https://dbc-f501771e-54b7.cloud.databricks.com
      root_path: ${var.workspace_bundle_root}/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: ebos_uc_demo
      medallion_bronze_schema: healthcare_medallion_prod_bronze
      medallion_silver_schema: healthcare_medallion_prod_silver
      warehouse_id: ""
      service_principal_name: <TBD-AI-INSIGHTS-PROD-SP>
    run_as:
      service_principal_name: ${var.service_principal_name}
    permissions:
      - user_name: ${var.bundle_deploying_user_name}
        level: CAN_MANAGE
      - service_principal_name: ${var.service_principal_name}
        level: CAN_MANAGE


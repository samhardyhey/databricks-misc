bundle:
  name: ai_powered_insights_dashboards
  uuid: 9a4c2f2f-4d9b-4d7a-9b12-0f0d5e2f6c33

include:
  - resources/*.yml

sync:
  paths:
    - ../../../..

variables:
  catalog:
    description: Unity Catalog containing medallion outputs used by the dashboards
    default: workspace
  medallion_schema:
    description: Medallion schema containing silver/gold outputs (UC schema)
    default: healthcare_medallion_dev
  sql_warehouse_id:
    description: Warehouse ID used to run dashboard queries
    default: ""
  service_principal_name:
    description: Service principal used for run_as
    default: c8c4498a-fd58-45b7-a8c7-39f91f385dbf

targets:
  dev-sp:
    mode: development
    default: true
    workspace:
      host: https://dbc-f501771e-54b7.cloud.databricks.com
      root_path: /Workspace/Users/samhardyhey@gmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: workspace
      medallion_schema: healthcare_medallion_dev
      sql_warehouse_id: ""
      service_principal_name: <TBD-AI-INSIGHTS-DEV-SP>
    run_as:
      service_principal_name: ${var.service_principal_name}

  test-sp:
    mode: development
    workspace:
      host: https://dbc-f501771e-54b7.cloud.databricks.com
      root_path: /Workspace/Users/samhardyhey@gmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: workspace
      medallion_schema: healthcare_medallion_test
      sql_warehouse_id: ""
      service_principal_name: <TBD-AI-INSIGHTS-TEST-SP>
    run_as:
      service_principal_name: ${var.service_principal_name}

  prod-sp:
    mode: production
    workspace:
      host: https://dbc-f501771e-54b7.cloud.databricks.com
      root_path: /Workspace/Users/samhardyhey@gmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: workspace
      medallion_schema: healthcare_medallion_prod
      sql_warehouse_id: ""
      service_principal_name: <TBD-AI-INSIGHTS-PROD-SP>
    run_as:
      service_principal_name: ${var.service_principal_name}


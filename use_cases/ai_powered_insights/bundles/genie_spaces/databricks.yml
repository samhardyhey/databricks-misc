# Genie Space resources: set sql_warehouse_id and service principal per target before relying on deploy.
bundle:
  name: ai_powered_insights_genie_spaces
  uuid: 3a6a5b2e-7ad3-4d9b-9a9e-1a0c7d0b1b1a

include:
  - resources/*.yml

sync:
  paths:
    - ../../../..

variables:
  catalog:
    description: Unity Catalog containing medallion outputs used by dashboards/Genie
    default: ebos_uc_demo
  medallion_bronze_schema:
    description: Medallion bronze schema (dbt/UC schema), e.g. healthcare_medallion_dev_bronze
    default: healthcare_medallion_dev_bronze
  medallion_silver_schema:
    description: Medallion silver schema (dbt/UC schema), e.g. healthcare_medallion_dev_silver
    default: healthcare_medallion_dev_silver
  medallion_gold_schema:
    description: Medallion gold schema (dbt/UC schema), e.g. healthcare_medallion_dev_gold
    default: healthcare_medallion_dev_gold
  service_principal_name:
    description: Service principal used for run_as
    default: c8c4498a-fd58-45b7-a8c7-39f91f385dbf
  sql_warehouse_id:
    description: SQL warehouse ID used by Genie/Knowledge Store (placeholder)
    default: ""

targets:
  dev-sp:
    mode: development
    default: true
    workspace:
      host: https://dbc-f501771e-54b7.cloud.databricks.com
      root_path: /Workspace/Users/sam.hardy@ebosgroup.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: ebos_uc_demo
      medallion_bronze_schema: healthcare_medallion_dev_bronze
      medallion_silver_schema: healthcare_medallion_dev_silver
      medallion_gold_schema: healthcare_medallion_dev_gold
      service_principal_name: <TBD-AI-INSIGHTS-DEV-SP>
      sql_warehouse_id: ""
    run_as:
      service_principal_name: ${var.service_principal_name}
    permissions:
      - user_name: sam.hardy@ebosgroup.com
        level: CAN_MANAGE
      - service_principal_name: ${var.service_principal_name}
        level: CAN_MANAGE

  test-sp:
    mode: development
    workspace:
      host: https://dbc-f501771e-54b7.cloud.databricks.com
      root_path: /Workspace/Users/sam.hardy@ebosgroup.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: ebos_uc_demo
      medallion_bronze_schema: healthcare_medallion_test_bronze
      medallion_silver_schema: healthcare_medallion_test_silver
      medallion_gold_schema: healthcare_medallion_test_gold
      service_principal_name: <TBD-AI-INSIGHTS-TEST-SP>
      sql_warehouse_id: ""
    run_as:
      service_principal_name: ${var.service_principal_name}
    permissions:
      - user_name: sam.hardy@ebosgroup.com
        level: CAN_MANAGE
      - service_principal_name: ${var.service_principal_name}
        level: CAN_MANAGE

  prod-sp:
    mode: production
    workspace:
      host: https://dbc-f501771e-54b7.cloud.databricks.com
      root_path: /Workspace/Users/sam.hardy@ebosgroup.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: ebos_uc_demo
      medallion_bronze_schema: healthcare_medallion_prod_bronze
      medallion_silver_schema: healthcare_medallion_prod_silver
      medallion_gold_schema: healthcare_medallion_prod_gold
      service_principal_name: <TBD-AI-INSIGHTS-PROD-SP>
      sql_warehouse_id: ""
    run_as:
      service_principal_name: ${var.service_principal_name}
    permissions:
      - user_name: sam.hardy@ebosgroup.com
        level: CAN_MANAGE
      - service_principal_name: ${var.service_principal_name}
        level: CAN_MANAGE


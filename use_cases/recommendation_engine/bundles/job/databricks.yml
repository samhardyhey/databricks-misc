# Recommendation engine bundle (co-located with use case code).
# Deploy: databricks bundle deploy -t dev-sp (from this directory or repo root).
bundle:
  name: recommendation_engine
  uuid: a1b2c3d4-e5f6-4a7b-8c9d-0e1f2a3b4c5d

include:
  - resources/*.yml

sync:
  paths:
    - ../../../..  # repo root so use_cases/* and data/ are available

variables:
  catalog:
    description: Unity Catalog for medallion (reco reads from medallion schema)
    default: ebos_uc_demo
  tag_environment:
    description: Deployment tier for job tags (dev / test / prod)
    default: dev
  medallion_silver_schema:
    description: Shared medallion silver schema (inputs), e.g. ebos_uc_demo.healthcare_medallion_dev_silver
    default: ebos_uc_demo.healthcare_medallion_dev_silver
  output_schema:
    description: Reco-owned output schema, e.g. ebos_uc_demo.recommendation_engine_dev
    default: ebos_uc_demo.recommendation_engine_dev
  workspace_root:
    description: Workspace path where bundle is deployed (for PYTHONPATH)
    default: ""
  service_principal_name:
    description: Service principal name for this environment (matches example endpoints bundle pattern)
    default: c8c4498a-fd58-45b7-a8c7-39f91f385dbf

  workspace_bundle_root:
    description: Workspace home for bundle.state path; override for SP-owned home (see uc_foundation bundle)
    default: /Workspace/Users/sam.hardy@ebosgroup.com

  bundle_deploying_user_name:
    description: Human user for bundle CAN_MANAGE permissions alongside run_as SP
    default: sam.hardy@ebosgroup.com

targets:
  dev-sp:
    mode: development
    default: true
    workspace:
      host: https://dbc-f501771e-54b7.cloud.databricks.com
      root_path: ${var.workspace_bundle_root}/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: ebos_uc_demo
      tag_environment: dev
      medallion_silver_schema: ebos_uc_demo.healthcare_medallion_dev_silver
      output_schema: ebos_uc_demo.recommendation_engine_dev
      workspace_root: ${var.workspace_bundle_root}/.bundle/${bundle.name}/${bundle.target}
      service_principal_name: <TBD-RECO-DEV-SP>
    run_as:
      service_principal_name: ${var.service_principal_name}
    permissions:
      - user_name: ${var.bundle_deploying_user_name}
        level: CAN_MANAGE
      - service_principal_name: ${var.service_principal_name}
        level: CAN_MANAGE

  test-sp:
    mode: development
    workspace:
      host: https://dbc-f501771e-54b7.cloud.databricks.com
      root_path: ${var.workspace_bundle_root}/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: ebos_uc_demo
      tag_environment: test
      medallion_silver_schema: ebos_uc_demo.healthcare_medallion_test_silver
      output_schema: ebos_uc_demo.recommendation_engine_test
      workspace_root: ${var.workspace_bundle_root}/.bundle/${bundle.name}/${bundle.target}
      service_principal_name: <TBD-RECO-TEST-SP>
    run_as:
      service_principal_name: ${var.service_principal_name}
    permissions:
      - user_name: ${var.bundle_deploying_user_name}
        level: CAN_MANAGE
      - service_principal_name: ${var.service_principal_name}
        level: CAN_MANAGE

  prod-sp:
    mode: production
    workspace:
      host: https://dbc-f501771e-54b7.cloud.databricks.com
      root_path: ${var.workspace_bundle_root}/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: ebos_uc_demo
      tag_environment: prod
      medallion_silver_schema: ebos_uc_demo.healthcare_medallion_prod_silver
      output_schema: ebos_uc_demo.recommendation_engine_prod
      workspace_root: ${var.workspace_bundle_root}/.bundle/${bundle.name}/${bundle.target}
      service_principal_name: <TBD-RECO-PROD-SP>
    run_as:
      service_principal_name: ${var.service_principal_name}
    permissions:
      - user_name: ${var.bundle_deploying_user_name}
        level: CAN_MANAGE
      - service_principal_name: ${var.service_principal_name}
        level: CAN_MANAGE


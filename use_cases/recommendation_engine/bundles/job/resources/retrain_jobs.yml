# Recommendation engine retrain jobs (train models + log to MLflow)
resources:
  jobs:

    recommendation_engine_lightfm_retrain:
      name: recommendation_engine_lightfm_retrain
      description: "Retrain LightFM recommender for recommendation engine"

      schedule:
        quartz_cron_expression: "0 15 6 * * ?"  # daily 6:15am
        timezone_id: Australia/Sydney
        pause_status: PAUSED

      tasks:
        - task_key: retrain_lightfm
          spark_python_task:
            python_file: use_cases/recommendation_engine/models/lightfm/train.py
          environment_key: retrain_env
    recommendation_engine_retrain:
      name: recommendation_engine_retrain
      description: "Retrain recommendation engine models (item_similarity, ALS, ranker) and log to MLflow"

      schedule:
        quartz_cron_expression: "0 0 6 * * ?"  # daily 6am
        timezone_id: Australia/Sydney
        pause_status: PAUSED

      tasks:
        - task_key: retrain_recommendation_engine
          spark_python_task:
            python_file: use_cases/recommendation_engine/models/run_reco.py
          environment_key: retrain_env

      environments:
        - environment_key: retrain_env
          spec:
            client: "2"
            env_vars:
              RECO_DATA_SOURCE: auto
              RECO_CATALOG_SCHEMA: ${var.medallion_schema}
              PYTHONPATH: ${var.workspace_root}
            dependencies:
              - pandas>=2.0
              - scikit-learn>=1.3
              - loguru>=0.7
              - joblib
              - implicit
              - lightgbm>=4.0
              - mlflow

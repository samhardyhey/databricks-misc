# Recommendation engine retrain jobs (train models + log to MLflow)
resources:
  jobs:

    recommendation_engine_item_similarity_retrain:
      name: recommendation_engine_item_similarity_retrain
      description: "Retrain item-to-item similarity model (sklearn / MLflow)"
      tags:
        business_unit: ebos
        workload: ds-ml-demo
        uc_catalog: ebos_uc_demo
        repository: databricks-misc
        bundle: recommendation_engine
        deployment_environment: ${var.tag_environment}

      schedule:
        quartz_cron_expression: "0 5 6 * * ?"  # daily 6:05am (after build_training_base ~5:50)
        timezone_id: Australia/Sydney
        pause_status: PAUSED

      tasks:
        - task_key: retrain_item_similarity
          spark_python_task:
            python_file: use_cases/recommendation_engine/models/item_similarity/train.py
          environment_key: retrain_env

      environments:
        - environment_key: retrain_env
          spec:
            client: "2"
            env_vars:
              RECO_DATA_SOURCE: auto
              RECO_INPUT_SILVER_SCHEMA: ${var.medallion_silver_schema}
              RECO_OUTPUT_SCHEMA: ${var.output_schema}
              PYTHONPATH: ${var.workspace_root}
            dependencies:
              - pandas>=2.0
              - scikit-learn>=1.3
              - loguru>=0.7
              - joblib
              - implicit
              - lightgbm>=4.0
              - mlflow


    recommendation_engine_apply:
      name: recommendation_engine_apply
      description: "Integration / smoke: run_reco_smoke apply path. Prefer per-model apply jobs for production."
      tags:
        business_unit: ebos
        workload: ds-ml-demo
        uc_catalog: ebos_uc_demo
        repository: databricks-misc
        bundle: recommendation_engine

# Recommendation engine batch application jobs (generate offline recommendations)
resources:
  jobs:

    recommendation_engine_item_similarity_apply:
      name: recommendation_engine_item_similarity_apply
      description: "Batch application of item similarity (registry Champion by default)"
      tags:
        business_unit: ebos
        workload: ds-ml-demo
        uc_catalog: ebos_uc_demo
        repository: databricks-misc
        bundle: recommendation_engine
        deployment_environment: ${var.tag_environment}

      schedule:
        quartz_cron_expression: "0 32 6 * * ?"  # daily 6:32am
        timezone_id: Australia/Sydney
        pause_status: PAUSED

      tasks:
        - task_key: apply_item_similarity
          spark_python_task:
            python_file: use_cases/recommendation_engine/models/item_similarity/predict.py
          environment_key: apply_env

      environments:
        - environment_key: apply_env
          spec:
            client: "2"
            env_vars:
              RECO_DATA_SOURCE: auto
              RECO_INPUT_SILVER_SCHEMA: ${var.medallion_silver_schema}
              RECO_OUTPUT_SCHEMA: ${var.output_schema}
              PYTHONPATH: ${var.workspace_root}
              ITEM_SIMILARITY_MODEL_URI: models:/recommendation_engine-item_similarity@Champion
            dependencies:
              - pandas>=2.0
              - scikit-learn>=1.3
              - loguru>=0.7
              - joblib
              - implicit
              - lightgbm>=4.0
              - mlflow

    recommendation_engine_als_apply:

      schedule:
        quartz_cron_expression: "0 55 6 * * ?"  # after per-model apply jobs
        timezone_id: Australia/Sydney
        pause_status: PAUSED

      tasks:
        - task_key: apply_recommendation_engine
          # Uses run_reco_smoke.py so training/logging + MLflow load/apply are exercised in one job.

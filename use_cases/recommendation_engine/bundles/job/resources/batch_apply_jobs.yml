# Recommendation engine batch application jobs (generate offline recommendations)
resources:
  jobs:

    recommendation_engine_lightfm_apply:
      name: recommendation_engine_lightfm_apply
      description: "Batch application of LightFM recommender to generate recommendations"

      schedule:
        quartz_cron_expression: "0 40 6 * * ?"  # daily 6:40am
        timezone_id: Australia/Sydney
        pause_status: PAUSED

      tasks:
        - task_key: apply_lightfm
          spark_python_task:
            python_file: use_cases/recommendation_engine/models/lightfm/predict.py
          environment_key: apply_env
    recommendation_engine_apply:
      name: recommendation_engine_apply
      description: "Batch application of recommendation engine to generate candidate recommendations (future gold_reco_candidates)"

      schedule:
        quartz_cron_expression: "0 30 6 * * ?"  # daily 6:30am
        timezone_id: Australia/Sydney
        pause_status: PAUSED

      tasks:
        - task_key: apply_recommendation_engine
          # Uses run_reco_smoke.py so training/logging + MLflow load/apply are exercised locally too.
          spark_python_task:
            python_file: use_cases/recommendation_engine/models/run_reco_smoke.py
          environment_key: apply_env

      environments:
        - environment_key: apply_env
          spec:
            client: "2"
            env_vars:
              RECO_DATA_SOURCE: auto
              RECO_INPUT_SILVER_SCHEMA: ${var.medallion_silver_schema}
              RECO_OUTPUT_SCHEMA: ${var.output_schema}
              PYTHONPATH: ${var.workspace_root}
            dependencies:
              - pandas>=2.0
              - scikit-learn>=1.3
              - loguru>=0.7
              - joblib
              - implicit
              - lightgbm>=4.0
              - mlflow

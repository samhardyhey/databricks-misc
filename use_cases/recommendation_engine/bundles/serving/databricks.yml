bundle:
  name: recommendation_engine_serving

include:
  - resources/*.yml

sync:
  paths:
    - ../../../..  # repo root so use_cases/* and data/ are available

variables:
  catalog:
    description: Unity Catalog catalog for reco models
    default: workspace
  model_schema:
    description: Schema for registered recommendation models (e.g. workspace.default)
    default: workspace.default
  service_principal_name:
    description: Service principal name for this environment (matches example endpoints bundle pattern)
    default: c8c4498a-fd58-45b7-a8c7-39f91f385dbf

targets:
  dev-sp:
    mode: development
    default: true
    workspace:
      host: https://dbc-f501771e-54b7.cloud.databricks.com
      root_path: /Workspace/Users/samhardyhey@gmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: workspace
      model_schema: workspace.default
      service_principal_name: <TBD-RECO-SERVING-DEV-SP>
    run_as:
      service_principal_name: ${var.service_principal_name}
    permissions:
      - user_name: sam.hardy@ebosgroup.com
        level: CAN_MANAGE
      - service_principal_name: ${var.service_principal_name}
        level: CAN_MANAGE

  test-sp:
    mode: development
    workspace:
      host: https://dbc-f501771e-54b7.cloud.databricks.com
      root_path: /Workspace/Users/samhardyhey@gmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: workspace
      model_schema: workspace.default
      service_principal_name: <TBD-RECO-SERVING-TEST-SP>
    run_as:
      service_principal_name: ${var.service_principal_name}
    permissions:
      - user_name: sam.hardy@ebosgroup.com
        level: CAN_MANAGE
      - service_principal_name: ${var.service_principal_name}
        level: CAN_MANAGE

  prod-sp:
    mode: production
    workspace:
      host: https://dbc-f501771e-54b7.cloud.databricks.com
      root_path: /Workspace/Users/samhardyhey@gmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: workspace
      model_schema: workspace.default
      service_principal_name: <TBD-RECO-SERVING-PROD-SP>
    run_as:
      service_principal_name: ${var.service_principal_name}
    permissions:
      - user_name: sam.hardy@ebosgroup.com
        level: CAN_MANAGE
      - service_principal_name: ${var.service_principal_name}
        level: CAN_MANAGE


resources:
  model_serving_endpoints:
    recommendation_engine_item_similarity:
      name: recommendation-engine-item-similarity
      config:
        served_models:
          - name: item_similarity
            model_name: ${var.model_schema}.recommendation_engine-item_similarity
            # Use stable alias instead of pinning a numeric version.
            model_version: "@Champion"
            workload_size: Small
            scale_to_zero_enabled: true

    recommendation_engine_als:
      name: recommendation-engine-als
      config:
        served_models:
          - name: als_recommender
            model_name: ${var.model_schema}.recommendation_engine-als
            # Use stable alias instead of pinning a numeric version.
            model_version: "@Champion"
            workload_size: Small
            scale_to_zero_enabled: true

    recommendation_engine_lightfm:
      name: recommendation-engine-lightfm
      config:
        served_models:
          - name: lightfm_recommender
            model_name: ${var.model_schema}.recommendation_engine-lightfm
            # Use stable alias instead of pinning a numeric version.
            model_version: "@Champion"
            workload_size: Small
            scale_to_zero_enabled: true

    recommendation_engine_ranker:
      name: recommendation-engine-ranker
      config:
        served_models:
          - name: ranker
            model_name: ${var.model_schema}.recommendation_engine-ranker
            model_version: "@Champion"
            workload_size: Small
            scale_to_zero_enabled: true


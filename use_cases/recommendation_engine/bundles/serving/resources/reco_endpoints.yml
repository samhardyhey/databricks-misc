resources:
  model_serving_endpoints:
    recommendation_engine_item_similarity:
      name: recommendation-engine-item-similarity
      tags:
        - key: business_unit
          value: ebos
        - key: workload
          value: ds-ml-demo
        - key: uc_catalog
          value: ebos_uc_demo
        - key: repository
          value: databricks-misc
        - key: bundle
          value: recommendation_engine_serving
        - key: deployment_environment
          value: ${var.tag_environment}
      config:
        served_models:
          - name: item_similarity
            model_name: ${var.model_schema}.recommendation_engine-item_similarity
            # Use stable alias instead of pinning a numeric version.
            model_version: "@Champion"
            workload_size: Small
            scale_to_zero_enabled: true

    recommendation_engine_als:

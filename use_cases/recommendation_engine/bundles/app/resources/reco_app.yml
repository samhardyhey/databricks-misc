resources:
  apps:
    recommendation_engine_app:
      name: recommendation-engine-app
      description: "Streamlit app showcasing recommendation engine behaviour"
      source_code_path: use_cases/recommendation_engine/app
      environment:
        spec:
          env_vars:
            RECO_ENDPOINT_URL: ${var.reco_endpoint_url}
            RECO_ENDPOINT_URL_ITEM_SIMILARITY: ${var.reco_endpoint_url_item_similarity}
            RECO_ENDPOINT_URL_ALS: ${var.reco_endpoint_url_als}
            RECO_ENDPOINT_URL_LIGHTFM: ${var.reco_endpoint_url_lightfm}
          dependencies:
            - -r use_cases/recommendation_engine/app/requirements.txt


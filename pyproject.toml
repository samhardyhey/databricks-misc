[project]
name = "databricks-misc"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "databricks-connect==15.1.3",
    "databricks-sdk==0.69.0",
    "faker>=24.0.0",
    "pandas>=2.2.0",
    "numpy>=1.26.0",
    "loguru>=0.7.2",
    "reportlab>=4.0.0",
]

[project.optional-dependencies]
dev = [
    "autoflake8>=2.0.0",
    "isort>=5.12.0",
    "black>=24.0.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["data", "use_cases"]

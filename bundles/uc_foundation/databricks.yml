bundle:
  name: uc_foundation
  uuid: 8c4a6a2d-6c3d-4e7f-9f3f-0a3e7a0d4a2b

include:
  - resources/*.yml

variables:
  catalog_name:
    description: Unity Catalog name used across the repo
    default: workspace

  healthcare_raw_schema_name:
    description: Unity Catalog schema for raw generator outputs
    default: healthcare_dev_raw

  healthcare_medallion_schema_name:
    description: Base Unity Catalog schema for medallion outputs (environment-specific)
    default: healthcare_medallion_dev

  # Use-case output schemas (environment-specific). Use-cases read from shared medallion
  # but write all owned outputs into these schemas.
  recommendation_engine_schema_name:
    description: Output schema for recommendation_engine owned tables
    default: recommendation_engine_dev

  inventory_optimization_schema_name:
    description: Output schema for inventory_optimization owned tables
    default: inventory_optimization_dev

  ai_powered_insights_schema_name:
    description: Output schema for ai_powered_insights owned tables
    default: ai_powered_insights_dev

  document_intelligence_schema_name:
    description: Output schema for document_intelligence owned tables
    default: document_intelligence_dev

  docint_volume_schema_name:
    description: Unity Catalog schema used as the parent namespace for document-intelligence volumes (env-scoped)
    default: document_intelligence_dev

targets:
  dev-sp:
    mode: development
    default: true
    workspace:
      host: https://dbc-f501771e-54b7.cloud.databricks.com
      root_path: /Workspace/Users/samhardyhey@gmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      healthcare_raw_schema_name: healthcare_dev_raw
      healthcare_medallion_schema_name: healthcare_medallion_dev
      recommendation_engine_schema_name: recommendation_engine_dev
      inventory_optimization_schema_name: inventory_optimization_dev
      ai_powered_insights_schema_name: ai_powered_insights_dev
      document_intelligence_schema_name: document_intelligence_dev
      docint_volume_schema_name: document_intelligence_dev

  test-sp:
    mode: development
    workspace:
      host: https://dbc-f501771e-54b7.cloud.databricks.com
      root_path: /Workspace/Users/samhardyhey@gmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      healthcare_raw_schema_name: healthcare_test_raw
      healthcare_medallion_schema_name: healthcare_medallion_test
      recommendation_engine_schema_name: recommendation_engine_test
      inventory_optimization_schema_name: inventory_optimization_test
      ai_powered_insights_schema_name: ai_powered_insights_test
      document_intelligence_schema_name: document_intelligence_test
      docint_volume_schema_name: document_intelligence_test

  prod-sp:
    mode: production
    workspace:
      host: https://dbc-f501771e-54b7.cloud.databricks.com
      root_path: /Workspace/Users/samhardyhey@gmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      healthcare_raw_schema_name: healthcare_prod_raw
      healthcare_medallion_schema_name: healthcare_medallion_prod
      recommendation_engine_schema_name: recommendation_engine_prod
      inventory_optimization_schema_name: inventory_optimization_prod
      ai_powered_insights_schema_name: ai_powered_insights_prod
      document_intelligence_schema_name: document_intelligence_prod
      docint_volume_schema_name: document_intelligence_prod


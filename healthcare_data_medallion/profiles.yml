# Databricks profile for healthcare data medallion architecture
# Uses environment variables for secure authentication
healthcare_data:
  target: dev
  outputs:
    dev:
      type: databricks
      host: https://dbc-f501771e-54b7.cloud.databricks.com
      http_path: /sql/1.0/warehouses/2a475c6457a76313
      token: "{{ env_var('DATABRICKS_TOKEN') }}"
      schema: healthcare_medallion_dev
      threads: 4
      client_session_keep_alive: False
      connect_timeout: 10
      read_timeout: 300
      retry_all: True
      catalog: workspace

    prod:
      type: databricks
      host: https://dbc-f501771e-54b7.cloud.databricks.com
      http_path: /sql/1.0/warehouses/2a475c6457a76313
      token: "{{ env_var('DATABRICKS_TOKEN') }}"
      schema: healthcare_medallion_prod
      threads: 8
      client_session_keep_alive: False
      connect_timeout: 10
      read_timeout: 300
      retry_all: True
      catalog: workspace
